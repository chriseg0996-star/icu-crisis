    const last=this._tutI===this._tutSteps.length-1;

    box.innerHTML='<div class="tut-t">'+title+'</div>'+t(st.k)+
      '<div class="tut-btns"><button class="skip" onclick="G.endTutorial()">'+t('tut.skip')+'</button>'+
      '<button onclick="G.tutNext()">'+(last?t('tut.go'):t('tut.next'))+'</button></div>';
    const app=this.$('app').getBoundingClientRect();
    box.style.visibility='hidden';
    requestAnimationFrame(()=>{
      const bw=box.offsetWidth,bh=box.offsetHeight;
      let left=12,top=12;
      if(el){
        const r=el.getBoundingClientRect();
        left=r.left-app.left+r.width/2-bw/2;
        left=Math.max(8,Math.min(left,app.width-bw-8));
        top=r.bottom-app.top+10;
        if(top+bh>app.height-8)top=r.top-app.top-bh-10;
        if(top<8)top=8;
      }
      box.style.left=left+'px';box.style.top=top+'px';box.style.visibility='visible';
    });
  }

    try{localStorage.setItem(this._hintStoreKey||'icuTut','1');}catch(e){}

    this.$('tut-ov').classList.remove('v');

  // -- ECG waveform --
  _resetWave(){this._wCtx=null;this._wX=0;this._wD=null;this._wGrid=null;this._wInited=false;}

  _ecgSample(phase,p){
    if(phase<0.12||phase>=0.58)return 0;
    if(phase>=0.12&&phase<0.20){const q=(phase-0.12)/0.08;return 0.12*Math.sin(q*Math.PI);}
    if(phase>=0.20&&phase<0.28)return 0;
    const hr=p?p.HR:80;
    const qrsW=hr>120?0.10:0.14;
    const qrs0=0.28;
    if(phase>=qrs0&&phase<qrs0+qrsW){
      const q=(phase-qrs0)/qrsW;
      let amp=0.85;
      if(p&&p.SpO2<85)amp*=0.85;
      if(q<0.15)return -0.10*Math.sin(q/0.15*Math.PI);
      if(q<0.45)return amp*Math.sin((q-0.15)/0.30*Math.PI);
      return -0.20*Math.sin((q-0.45)/0.55*Math.PI);
    }
    if(phase>=0.40&&phase<0.58){const q=(phase-0.40)/0.18;return 0.35*Math.sin(q*Math.PI);}
    return 0;
  }

  drawWave(){
    const c=this.$('wave');
    if(!c||!this.p)return;
    if(!this._wCtx){
      const r=c.parentElement.getBoundingClientRect();
      const dpr=Math.min(1.5,window.devicePixelRatio||1);
      const w=Math.max(1,Math.floor(r.width*dpr));
      const h=92;
      c.width=w;c.height=h;
      this._wCtx=c.getContext('2d');
      this._wD=new Float32Array(w);
      this._wX=0;
      const gc=document.createElement('canvas');
      gc.width=w;gc.height=h;
      const gx=gc.getContext('2d');
      gx.fillStyle='#020508';
      gx.fillRect(0,0,w,h);
      gx.strokeStyle='rgba(0,255,136,.05)';
      gx.lineWidth=0.5;
      for(let gy=0;gy<h;gy+=24){gx.beginPath();gx.moveTo(0,gy);gx.lineTo(w,gy);gx.stroke();}
      this._wGrid=gc;
      this._wInited=false;
    }
    const ctx=this._wCtx,w=c.width,h=c.height,mid=h*0.5;
    const hr=Math.max(40,Math.min(200,this.p.HR));
    const steps=Math.max(1,Math.round(2*(hr/60)));
    const col=this._ecgColor||'#00ff88';
    let beep=false;
    for(let i=0;i<steps;i++){
      const prevPhase=((this._wX-1)%180)/180;
      const phase=(this._wX%180)/180;
      const y=this._ecgSample(phase,this.p);
      for(let x=0;x<w-1;x++)this._wD[x]=this._wD[x+1];
      this._wD[w-1]=y;
      if(prevPhase<0.34&&phase>=0.34)beep=true;
      this._wX++;
    }
    if(!this._wInited){
      ctx.drawImage(this._wGrid,0,0);
      this._wInited=true;
    }
    const scroll=Math.min(steps,w-1);
    if(scroll>0){
      ctx.drawImage(c,scroll,0,w-scroll,h,0,0,w-scroll,h);
      ctx.drawImage(this._wGrid,w-scroll,0,scroll,h,w-scroll,0,scroll,h);
      ctx.strokeStyle=col;
      ctx.lineWidth=2;
      ctx.lineJoin='round';
      ctx.beginPath();
      const x0=w-scroll-1;
      for(let x=x0;x<w;x++){
        const py=mid-this._wD[x]*(h*0.38);
        if(x===x0)ctx.moveTo(x,py);else ctx.lineTo(x,py);
      }
      ctx.stroke();
    }
    if(beep)this.snd.beep(this.p.SpO2);
  }

  // -- Core Loop --
  renderLoop(now){
    now=now||performance.now();
    this._rafId=null;
    if(this.running&&!this.over){
      if(!this.paused){
        const d=(now-this.lt)/1000;this.lt=now;this.acc+=d;
        let ticks=0;
        while(this.acc>=1&&!this.over&&ticks<5){this.acc-=1;this.tick();ticks++;}
        if(ticks>=5)this.acc=Math.min(this.acc,1);
        if(now-this._waveLast>=33){this._waveLast=now;this.drawWave();}
      }else{this.lt=now;}
      this._rafId=requestAnimationFrame(t=>this.renderLoop(t));
    }
  }

  tick(){
    if(this.over)return;
    this.gt++;
    if(this.lvl){
      if(this.mode==='survival'&&this._survGrace>0&&this.gt<this._survGrace)this.p.mult=this.lvl.mult*0.88;
      else this.p.mult=this.lvl.mult;
    }
    this.p.tick(1,this.gt);
    this.updateAll();
    const alarm=this.p.MAP<50||this.p.SpO2<80;
    const app=this._hud?this._hud.app:this.$('app');
    if(app&&alarm!==this._alarmOn){this._alarmOn=alarm;app.classList.toggle('alarm',alarm);}

    // Events
    for(const se of this.evts){if(!se.fired&&this.gt>=se.time){se.fired=true;this.fEvts.push(se.evt.id);se.evt.apply(this.p);this.snd.alarm();this._vib([80,40,80]);this._flashEvent(se.evt.id);this.log(getEventMsg(se.evt.id),'e');setTimeout(()=>{if(!this.over)this.log(getEventClue(se.evt.id),'w');},4000);}}

    // Critical alarm tone
    if((this.p.MAP<50||this.p.SpO2<80)&&this.gt%3===0)this.snd.alarm();

    this._tickCooldowns();

    if(this.p.stabAnnounced&&!this._stabM1){this._stabM1=true;this.log(t('game.stabTrend'),'s');}
    if(this.p.stableT>=12&&!this._stabM2){this._stabM2=true;this.log(t('game.stabilizing'),'s');}
    if(!this.p.stabAnnounced){this._stabM1=false;this._stabM2=false;}
    if(this.p.stableT>=this.lvl.stabReq){this.p.stabilized=true;}
    if(this.p.stabilized){
      const mon=this.$('scr-gs')?.querySelector('.mon');
      if(mon)mon.classList.add('stab-flash');
      this.endGame(true,'stabilized');return;
    }
    if(this.gt>=600){this.endGame(true,'survived');return;}

    this.checkAlerts();
    if(this.p.arrest)this.endGame(false);
  }

  _cacheHud(){
    this._hud={
      vMap:this.$('v-map'),vSpo2:this.$('v-spo2'),vHr:this.$('v-hr'),vRr:this.$('v-rr'),
      vcMap:this.$('vc-map'),vcSpo2:this.$('vc-spo2'),vcHr:this.$('vc-hr'),vcRr:this.$('vc-rr'),
      prob1:this.$('prob1'),prob2:this.$('prob2'),hdrPhase:this.$('hdr-phase'),hdrTimer:this.$('hdr-timer'),
      ast:this.$('ast'),bn:this.$('bn'),bfio2sub:this.$('bfio2-sub'),bpeepsub:this.$('bpeep-sub'),bvtsub:this.$('bvt-sub'),
      stabWrap:this.$('stab-wrap'),stabFill:this.$('stab-fill'),stabLblL:this.$('stab-lbl-l'),stabLblR:this.$('stab-lbl-r'),
      hdrSurv:this.$('hdr-surv'),app:this.$('app')
    };
    this._hudSnap={};
  }

  _setText(el,v){if(el&&el.textContent!==String(v))el.textContent=v;}
  _setColor(el,c){if(el&&el._vcol!==c){el._vcol=c;el.style.color=c;}}
  _setBoxState(el,st){
    if(!el)return;
    const w=st||'';
    if(el._vst===w)return;
    el._vst=w;
    el.classList.remove('w','cr','hl');
    if(w)el.classList.add(w);
  }

  _renderAst(tags){
    const el=this._hud&&this._hud.ast;
    if(!el)return;
    const key=tags.slice(0,6).map(t=>t.c+':'+t.t).join('|');
    if(this._astKey===key)return;
    this._astKey=key;
    el.replaceChildren();
    tags.slice(0,6).forEach(t=>{
      const s=document.createElement('span');
      s.className='at '+t.c;
      s.textContent=t.t;
      el.appendChild(s);
    });
  }

  updateAll(){
    const p=this.p,h=this._hud;
    if(!h)return;
    this._setText(h.vMap,p.MAP);this._setText(h.vSpo2,p.SpO2);
    this._setText(h.vHr,p.HR);this._setText(h.vRr,p.RR);
    this._setColor(h.vMap,this._mapColor(p.MAP));
    this._setColor(h.vSpo2,this._spo2Color(p.SpO2));
    this._setColor(h.vHr,this._hrColor(p.HR));
    this._setColor(h.vRr,this._rrColor(p.RR));
    const prob=p.primaryProblem;
    const mapSt=p.MAP<50?'cr':p.MAP<65?'w':(prob.p.id==='hemo'?'hl':'');
    const spoSt=p.SpO2<80?'cr':p.SpO2<90?'w':(prob.p.id==='oxy'?'hl':'');
    this._setBoxState(h.vcMap,mapSt);this._setBoxState(h.vcSpo2,spoSt);
    this._setBoxState(h.vcHr,p.HR>140?'cr':p.HR>120?'w':'');
    this._setBoxState(h.vcRr,p.RR>30?'cr':p.RR>24?'w':'');
    if(h.prob1){
      const pl=prob.p.label,pc='ptag '+prob.p.id;
      if(h.prob1.textContent!==pl)h.prob1.textContent=pl;
      if(h.prob1.className!==pc)h.prob1.className=pc;
    }
    if(h.prob2){
      if(prob.s){
        if(h.prob2.textContent!==prob.s.label)h.prob2.textContent=prob.s.label;
        const sc='ptag sec '+prob.s.id;
        if(h.prob2.className!==sc)h.prob2.className=sc;
        h.prob2.style.display='';
      }else h.prob2.style.display='none';
    }
    if(h.hdrPhase){
      const pn=p.phaseName,pc='pb '+p.phaseCSS;
      if(h.hdrPhase.textContent!==pn)h.hdrPhase.textContent=pn;
      if(h.hdrPhase.className!==pc)h.hdrPhase.className=pc;
    }
    const m=Math.floor(this.gt/60),s=this.gt%60;
    this._setText(h.hdrTimer,String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'));
    const tags=[];
    if(p.norepiOn)tags.push({t:t('tag.neOn'),c:p.norepiCum>120?'cr':'on'});
    if(p.dobuOn)tags.push({t:t('tag.dobu'),c:'on'});
    if(p.vasoOn)tags.push({t:t('tag.vaso'),c:'on'});
    if(p.epiT>0)tags.push({t:t('tag.epi'),c:'hi'});
    if(p.diureticActive)tags.push({t:t('tag.diuresis'),c:'on'});
    if(p.fio2>50)tags.push({t:'FiO₂:'+p.fio2,c:p.fio2>80?'cr':p.fio2>60?'hi':'on'});
    if(p.peep>8)tags.push({t:'PEEP:'+p.peep,c:p.peep>12?'hi':'on'});
    if(p.totalFluids>0)tags.push({t:p.totalFluids+'ml',c:p.totalFluids>2500?'cr':p.totalFluids>1500?'hi':'dm'});
    if(p.compliance<35)tags.push({t:'Crs:'+Math.round(p.compliance),c:p.compliance<25?'cr':'hi'});
    const pri=['cr','hi','on','dm'];
    tags.sort((a,b)=>pri.indexOf(a.c)-pri.indexOf(b.c));
    this._renderAst(tags);
    if(h.bn)h.bn.classList.toggle('to',p.norepiOn);
    if(h.bfio2sub)this._setText(h.bfio2sub,p.fio2+'%');
    if(h.bpeepsub)this._setText(h.bpeepsub,String(p.peep));
    if(h.bvtsub)this._setText(h.bvtsub,String(p.tidalVolume));
    const sw=h.stabWrap,sf=h.stabFill,sll=h.stabLblL,slr=h.stabLblR;
    if(sw&&this.running&&!this.over&&this.lvl){
      const req=this.lvl.stabReq||20;
      const cur=Math.min(req,Math.floor(p.stableT));
      sw.classList.add('on');
      sw.setAttribute('aria-hidden','false');
      if(sf){
        const wp=Math.round(cur/req*100)+'%';
        if(sf.style.width!==wp)sf.style.width=wp;
        sf.classList.toggle('ready',cur>=req);
      }
      const near=cur>=Math.ceil(req*.8)&&cur<req;
      sw.classList.toggle('near',near);
      if(near&&!this._stabNear){this._stabNear=true;this.snd.nearStab();}
      if(!near)this._stabNear=false;
      const slTxt=p.stabAnnounced||cur>0?t('game.stabBar'):t('game.stabGoal');
      if(sll&&sll.textContent!==slTxt)sll.textContent=slTxt;
      const srTxt=cur+'/'+req+'s';
      if(slr&&slr.textContent!==srTxt)slr.textContent=srTxt;
    }else if(sw){sw.classList.remove('on','near');sw.setAttribute('aria-hidden','true');}
    const hs=h.hdrSurv;
    if(hs){
      if(this.mode==='survival'&&this.running&&!this.over){
        if(hs.style.display!=='')hs.style.display='';
        const st=this.survTotal>0?t('lvl.survScore',{s:this.survTotal}):'';
        this._setText(hs,st);
      }else{
        if(hs.style.display!=='none')hs.style.display='none';
        if(hs.textContent!=='')hs.textContent='';
      }
    }
    if(this.$('modal-backdrop')?.classList.contains('v'))this.updateModalButtons();
  }

  _colorVital(id,c){const e=this.$(id);if(e)this._setColor(e,c);}

  _mapColor(v){if(v>=65)return'var(--g)';if(v>=55)return'var(--y)';return'var(--r)';}

  _spo2Color(v){if(v>=92)return'var(--g)';if(v>=80)return'var(--y)';return'var(--r)';}

  _hrColor(v){if(v<=100)return'var(--g)';if(v<=130)return'var(--y)';return'var(--r)';}

  _rrColor(v){if(v<=22)return'var(--g)';if(v<=28)return'var(--y)';return'var(--r)';}

  // -- Alerts (contextual only) --
  _thr(k,i){if(!this.at[k]||this.gt-this.at[k]>=i){this.at[k]=this.gt;return true;}return false;}
  checkAlerts(){
    const p=this.p,cl=this.gt<this._abgUntil;
    if(p.MAP<50&&this._thr('m3',8))this.log(t('alert.mapArrest',{n:p.MAP}),'d');
    if(p.SpO2<80&&this._thr('s3',8))this.log(t('alert.spo2Crit',{n:p.SpO2}),'d');
    if(p.MAP<65&&p.norepiOn&&this._thr('cx1',22)){if(p.lactate>3)this.log(t('alert.mapLac'),'w');else if(p.totalFluids<1000)this.log(t('alert.mapVol'),'w');}
    if(p.MAP<65&&!p.norepiOn&&p.totalFluids<500&&this._thr('cx2',25))this.log(t('alert.mapNoSupport',{n:p.MAP}),'w');
    if(p.totalFluids>=1500&&p.MAP<65&&!p.norepiOn&&this._thr('cx3',25))this.log(t('alert.noFluidResp'),'w');
    if(p.SpO2<90&&p.fio2>=60&&this._thr('cx4',22)){if(p.secretions>40)this.log(t('alert.spo2Airway'),'w');else if(p.pulmonaryEdema>30)this.log(t('alert.spo2Crackles'),'w');else this.log(t('alert.spo2Fio2'),'w');}
    if(p.secretions>40&&this._thr('cx6',20))this.log(cl?t('alert.peakResist'):t('alert.ventAlarm'),'w');
    if(p.secretions>70&&this._thr('cx7',12))this.log(t('alert.cannotVent'),'d');
    if(p.pulmonaryEdema>30&&this._thr('cx8',22))this.log(cl?t('alert.blines'):t('alert.cracklesInc'),'w');
    if(cl){
      if(p.vascularTone<40&&this._thr('cl1',25))this.log(t('alert.warmShock'),'i');
      if(p.compliance<30&&p.pulmonaryEdema>20&&this._thr('cl2',25))this.log(t('alert.compWater'),'i');
      if(p.secretions>35&&p.compliance>35&&this._thr('cl3',25))this.log(t('alert.compResist'),'i');
      if(p.rvStrain>25&&this._thr('cl4',25))this.log(t('alert.rvStrain'),'i');
      if(p.co2bias>5&&this._thr('cl5',25))this.log(t('alert.co2Ret'),'i');
    }
    if(p.phase===3&&this._thr('p3',999))this.log(t('alert.worsening'),'d');
    if(p.phase===4&&this._thr('p4',999))this.log(t('alert.decomp'),'d');
    if(p._evtSec&&p.secretions<20&&this._thr('esr',999)){p._evtSec=false;this.log(t('game.airwaysClear'),'s');}
  }

  // -- Actions --
  _bl(){return this.over||this.paused||!this.running;}
  _toast(id,t,c){const el=this.$(id);if(!el)return;const s=document.createElement('span');s.className='mt '+(c||'pos');s.textContent=t;el.appendChild(s);el.classList.add('gw');setTimeout(()=>{el.classList.remove('gw');if(s.parentNode)s.remove();},1200);}
  _setCD(key,id,cdid,sec){
    this._cd[key]=true;
    if(!this._cdUntil)this._cdUntil={};
    this._cdUntil[key]={t:this.gt+sec,bid:id,cid:cdid};
    const b=id?this.$(id):null,c=cdid?this.$(cdid):null;
    if(b)b.classList.add('cd');
    if(c)c.textContent=sec+'s';
  }

  _tickCooldowns(){
    if(!this._cdUntil)return;
    const keys=Object.keys(this._cdUntil);
    for(let i=0;i<keys.length;i++){
      const key=keys[i];
      const cd=this._cdUntil[key];
      const left=cd.t-this.gt;
      if(left<=0){
        delete this._cdUntil[key];
        this._cd[key]=false;
        const b=cd.bid?this.$(cd.bid):null;
        if(b)b.classList.remove('cd');
        const c=cd.cid?this.$(cd.cid):null;
        if(c)c.textContent='';
      }else{
        const c=cd.cid?this.$(cd.cid):null;
        if(c)c.textContent=left+'s';
      }
    }
  }

  _judge(id,good){
    this._toast(id,good?'✓':'✗',good?'pos':'neg');
    if(good)this.snd.good();else{this.snd.bad();this._vib(60);}
  }

  _lock(key,id,cdid){this._cd[key]=true;const b=this.$(id);if(b)b.classList.add('cd');const c=this.$(cdid);if(c)c.textContent='✓';}

  doFluids(){if(this._bl()||this._cd.f)return;const p=this.p;const r=p.giveFluids();
    if(p.pulmonaryEdema>40||p.pathKeys.includes('rvfail')){p.wrongAct++;this._judge('bf',false);}
    else if(p.MAP<65&&(p.pathKeys.includes('sepsis')||p.pathKeys.includes('hypovolemic')||p.pathKeys.includes('anaphylaxis'))){p.correctAct++;this._judge('bf',true);}
    else this._toast('bf',r?'+MAP':'~','pos');
    this.log(t('game.fluidBolus',{n:p.totalFluids}),'i');setTimeout(()=>{if(this.over)return;if(r)this.log(t('game.preloadOk'),'s');else this.log(t('game.preloadMin'),'w');},2000);this._setCD('f','bf','cf',8);}
  toggleNE(){if(this._bl())return;const p=this.p;p.norepiOn=!p.norepiOn;if(p.norepiOn){p._neJust=true;p._mapAtN=p.MAP;p._mapB.push({a:5,r:8,d:5/8});
    if(p.vascularTone<50&&p.MAP<65){p.correctAct++;this._judge('bn',true);}else this._toast('bn','+MAP','pos');
    this.log(t('game.neStart'),'i');setTimeout(()=>{if(!this.over&&p.norepiOn){const d=p.MAP-p._mapAtN;this.log(d>=5?t('game.neRespond',{n:d}):t('game.neTrend'),'s');}},4000);}else{this.log(t('game.neStop'),'i');}}
  doSuction(){if(this._bl()||this._cd.s)return;const p=this.p;const r=p.doSuction();
    if(r&&p.pathKeys.includes('airway')){p.correctAct++;this._judge('bs',true);}
    else this._toast('bs',r?'+O₂':' - ',r?'pos':'neu');
    this.log(r?t('game.suctionOk'):t('game.suctionMin'),r?'s':'');this._setCD('s','bs','cs',12);}
  doDiuretic(){if(this._bl()||this._cd.di)return;const p=this.p;if(p.diureticActive){this.log(t('game.diureticInfusing'),'');return;}
    const wrong=p.bleed>15||(p.pathKeys.includes('hypovolemic')&&p.totalFluids<500);
    const right=p.pulmonaryEdema>30;
    p.giveDiuretic();this.log(t('game.diureticGiven'),'i');
    if(wrong){p.wrongAct++;this._judge('bmeds',false);}
    else if(right){p.correctAct++;this._judge('bmeds',true);}
    const fb=p._tutorial?5000:10000;setTimeout(()=>{if(!this.over){if(p.pulmonaryEdema>15||p._tutorial)this.log(t('game.diureticOk'),'s');else this.log(t('game.diureticMin'),'w');}},fb);this._setCD('di','mb-diuretic','mc-diuretic',30);}

  giveMed(key){
    if(this._bl()||this._cd['m_'+key]||!this._unl(key))return;
    const p=this.p;
    if(key==='diuretic'){this.doDiuretic();return;}
    if(key==='abx'){
      if(p.abxGiven){this.log(t('game.abxAlready'),'');return;}
      p.abxGiven=true;p.abxT=60;
      p._abxWorks=p.pathKeys.includes('sepsis')||p.pathKeys.includes('mixed')||p.infection>30;
      this.log(t('game.abxGiven'),'i');
      this._lock('m_abx','mb-abx','mc-abx');
      if(p._abxWorks){p.correctAct++;this._judge('bmeds',true);setTimeout(()=>{if(!this.over&&p.abxApplied)this.log(t('game.abxWorking'),'s');},70000);}
      else{p.wrongAct++;this._judge('bmeds',false);setTimeout(()=>{if(!this.over)this.log(t('game.abxNoSource'),'w');},8000);}
      return;
    }
    if(key==='bronch'){
      this.log(t('game.bronchGiven'),'i');
      this._setCD('m_bronch','mb-bronch','mc-bronch',45);
      if(p.pathKeys.includes('copd')||p.pathKeys.includes('anaphylaxis')){p.bronchT=60;p._bronchGiven=true;p.correctAct++;this._judge('bmeds',true);setTimeout(()=>{if(!this.over)this.log(t('game.bronchOk'),'s');},8000);}
      else{p._dHR+=8;p.wrongAct++;this._judge('bmeds',false);setTimeout(()=>{if(!this.over)this.log(t('game.bronchNo'),'w');},5000);}
      return;
    }
    if(key==='anticoag'){
      this.log(t('game.anticoagGiven'),'i');
      this._lock('m_anticoag','mb-anticoag','mc-anticoag');
      if(p.bleed>5||p.pathKeys.includes('hypovolemic')){p.bleed=Math.min(95,p.bleed+25);p.perfusion=Math.max(0,p.perfusion-5);p.wrongAct++;this._judge('bmeds',false);this._vib(80);setTimeout(()=>{if(!this.over)this.log(t('game.anticoagBleed'),'d');},5000);}
      else if(p.pathKeys.includes('pe')||(p.rvStrain>30&&!p.pathKeys.includes('tamponade'))){p.anticoagOn=true;p.correctAct++;this._judge('bmeds',true);setTimeout(()=>{if(!this.over)this.log(t('game.anticoagOk'),'s');},10000);}
      else{p.wrongAct++;this._judge('bmeds',false);setTimeout(()=>{if(!this.over)this.log(t('game.anticoagNo'),'w');},5000);}
      return;
    }
    if(key==='transfusion'){
      this.log(t('game.transfGiven'),'i');
      this._setCD('m_transfusion','mb-transfusion','mc-transfusion',25);
      const right=p.bleed>10||p.pathKeys.includes('hypovolemic');
      p.giveTransfusion();
      if(right){p.correctAct++;this._judge('bmeds',true);setTimeout(()=>{if(!this.over)this.log(t('game.transfOk'),'s');},8000);}
      else{p.pulmonaryEdema=Math.min(100,p.pulmonaryEdema+8);p.wrongAct++;this._judge('bmeds',false);setTimeout(()=>{if(!this.over)this.log(t('game.transfTaco'),'w');},8000);}
      return;
    }
    if(key==='dobu'){
      p.dobuOn=!p.dobuOn;
      if(p.dobuOn){
        this.log(t('game.dobuOn'),'i');
        if(p.pathKeys.includes('cardiogenic')||p.cardiacOutput<45){p.correctAct++;this._judge('bmeds',true);setTimeout(()=>{if(!this.over&&p.dobuOn)this.log(t('game.dobuOk'),'s');},10000);}
        else if(p.vascularTone<45){p.wrongAct++;this._judge('bmeds',false);setTimeout(()=>{if(!this.over)this.log(t('game.dobuVasodil'),'w');},6000);}
      }else this.log(t('game.dobuOff'),'i');
      return;
    }
    if(key==='vaso'){
      p.vasoOn=!p.vasoOn;
      if(p.vasoOn){
        this.log(t('game.vasoOn'),'i');
        if(p.norepiOn&&p.MAP<60){p.correctAct++;this._judge('bmeds',true);}
      }else this.log(t('game.vasoOff'),'i');
      return;
    }
    if(key==='epi'){
      if(p.epiT>0)return;
      this.log(t('game.epiGiven'),'i');
      this._setCD('m_epi','mb-epi','mc-epi',45);
      p.giveEpi();
      if(p.pathKeys.includes('anaphylaxis')){p.correctAct++;this._judge('bmeds',true);setTimeout(()=>{if(!this.over)this.log(t('game.epiOk'),'s');},8000);}
      else{p._dHR+=15;p.wrongAct++;this._judge('bmeds',false);this._vib(80);setTimeout(()=>{if(!this.over)this.log(t('game.epiNo'),'w');},5000);}
      return;
    }
    if(key==='pericardio'){
      this.log(t('game.periStart'),'i');
      this._lock('m_pericardio','mb-pericardio','mc-pericardio');
      const ok=p.doPericardio();
      if(ok){p.correctAct++;this._judge('bmeds',true);setTimeout(()=>{if(!this.over)this.log(t('game.periOk'),'s');},6000);}
      else{p.wrongAct++;this._judge('bmeds',false);this._vib(120);setTimeout(()=>{if(!this.over)this.log(t('game.periBad'),'d');},4000);}
      return;
    }
  }

  orderABG(){if(this._bl()||this.abgPend||!this._unl('abg'))return;this.abgPend=true;this._abgN++;this.log(t('game.abgDrawn'),'i');this._setCD('abg','ba','ca',12);
    setTimeout(()=>{if(this.over)return;const a=this.p.getABG();const sev=a.Lac>4?'d':a.Lac>2?'w':'s';this.log(t('game.abgResult',{ph:a.pH.toFixed(2),pao2:a.PaO2,paco2:a.PaCO2,lac:a.Lac.toFixed(1),pf:a.PF}),sev);this.log(a.interp,a.PF<200||a.Lac>2.5?'w':'s');this._abgUntil=this.gt+20;this.abgPend=false;},12000);}

  runDiag(key){const tool=DIAG_TOOLS[key];if(!tool||this._bl()||this._cd['d_'+key]||!this._unl(key))return;
    this._sessionDiags[key]=true;
    this.log(t('diag.'+key+'.ordered'),'i');this._setCD('d_'+key,'db-'+key,'dc-'+key,tool.cd);
    setTimeout(()=>{if(this.over)return;const r=tool.run(this.p);this.log(r,'i');if(key==='pocus'||key==='echo')this.showDxVisual(key);this._abgUntil=Math.max(this._abgUntil,this.gt+12);},tool.delay*1000);}

  // -- Visual diagnostics --
  showDxVisual(key){
    const cv=this.$('dxv-c');if(!cv)return;
    const ctx=cv.getContext('2d');
    this.$('dxv-t').textContent=t('dxv.'+key);
    this.$('dxv-hint').textContent=t('dxv.close');
    if(key==='pocus')this._drawPocus(ctx,cv.width,cv.height);
    else this._drawEcho(ctx,cv.width,cv.height);
    this.$('dxv').classList.add('v');
    clearTimeout(this._dxvT);
    this._dxvT=setTimeout(()=>this.closeDxVisual(),8000);
  }

  closeDxVisual(){clearTimeout(this._dxvT);const d=this.$('dxv');if(d)d.classList.remove('v');}

  _dxSector(ctx,w,h){
    const cx=w/2,ay=6,r=h-12,a0=Math.PI/2-0.66,a1=Math.PI/2+0.66;
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    ctx.save();
    ctx.beginPath();ctx.moveTo(cx,ay);ctx.arc(cx,ay,r,a0,a1);ctx.closePath();ctx.clip();
    for(let i=0;i<1100;i++){const g=Math.floor(Math.random()*36);ctx.fillStyle='rgb('+g+','+g+','+g+')';ctx.fillRect(Math.random()*w,Math.random()*h,2,2);}
    return{cx,ay,r,a0,a1};
  }

  _dxFrame(ctx,s){
    ctx.restore();
    ctx.strokeStyle='rgba(0,221,255,.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(s.cx,s.ay);ctx.arc(s.cx,s.ay,s.r,s.a0,s.a1);ctx.closePath();ctx.stroke();
  }

  _drawPocus(ctx,w,h){
    const p=this.p,s=this._dxSector(ctx,w,h);
    const{cx,ay,r,a0,a1}=s;
    // pleural line
    ctx.strokeStyle='rgba(235,235,235,.95)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(cx,ay,46,a0+0.07,a1-0.07);ctx.stroke();
    const nB=Math.min(6,Math.floor(p.pulmonaryEdema/14));
    if(nB>0){
      for(let i=0;i<nB;i++){
        const ang=a0+0.13+(a1-a0-0.26)*(i+0.5)/nB;
        const x0=cx+Math.cos(ang)*47,y0=ay+Math.sin(ang)*47;
        const x1=cx+Math.cos(ang)*(r-4),y1=ay+Math.sin(ang)*(r-4);
        const gr=ctx.createLinearGradient(x0,y0,x1,y1);
        gr.addColorStop(0,'rgba(255,255,255,.9)');gr.addColorStop(1,'rgba(255,255,255,.10)');
        ctx.strokeStyle=gr;ctx.lineWidth=5;
        ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
      }
    }else{
      ctx.strokeStyle='rgba(210,210,210,.30)';ctx.lineWidth=2;
      [92,138].forEach(d=>{if(d<r){ctx.beginPath();ctx.arc(cx,ay,d,a0+0.10,a1-0.10);ctx.stroke();}});
    }
    if(p.secretions>40){
      ctx.fillStyle='rgba(185,185,185,.40)';
      ctx.beginPath();ctx.ellipse(cx-48,h-46,26,17,0.4,0,7);ctx.fill();
    }
    this._dxFrame(ctx,s);
  }

  _drawEcho(ctx,w,h){
    const p=this.p,s=this._dxSector(ctx,w,h);
    const{cx}=s;const cy=h*0.56;
    const tamp=p.pathKeys.includes('tamponade')&&!p.drained;
    if(tamp){
      ctx.fillStyle='rgba(5,5,5,1)';
      ctx.beginPath();ctx.ellipse(cx,cy,86,60,0,0,7);ctx.fill();
      ctx.strokeStyle='rgba(225,225,225,.55)';ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(cx,cy,86,60,0,0,7);ctx.stroke();
    }
    // myocardium
    ctx.fillStyle='rgba(150,150,150,.55)';
    ctx.beginPath();ctx.ellipse(cx,cy,66,46,0,0,7);ctx.fill();
    // chambers
    const rvw=16+Math.min(30,Math.max(0,p.rvStrain)*0.5);
    ctx.fillStyle='#070707';
    ctx.beginPath();ctx.ellipse(cx+26,cy,22,30,0,0,7);ctx.fill();   // LV
    ctx.beginPath();ctx.ellipse(cx-22,cy,rvw,28,0,0,7);ctx.fill();  // RV
    // septum
    ctx.strokeStyle='rgba(190,190,190,.7)';ctx.lineWidth=3;
    ctx.beginPath();
    if(p.rvStrain>30){ctx.moveTo(cx+2,cy-28);ctx.quadraticCurveTo(cx+14,cy,cx+2,cy+28);}
    else{ctx.moveTo(cx+2,cy-28);ctx.lineTo(cx+2,cy+28);}
    ctx.stroke();
    ctx.font='11px monospace';
    ctx.fillStyle='rgba(220,220,220,.8)';
    ctx.fillText('RV',cx-30,cy+4);ctx.fillText('LV',cx+19,cy+4);
    if(p.rvStrain>30){ctx.fillStyle='rgba(255,80,90,.9)';ctx.fillText('RV ▲▲',cx-66,cy-34);}
    if(tamp){ctx.fillStyle='rgba(0,221,255,.9)';ctx.fillText('EFF',cx+52,cy-44);}
    if(p.cardiacOutput<45){ctx.fillStyle='rgba(255,170,60,.9)';ctx.fillText('EF ↓',cx+44,cy+48);}
    this._dxFrame(ctx,s);
  }

  _syncPauseIcon(){const b=this.$('pfab');if(b)b.textContent=this.paused?'▶':'⏸';}

  _renderPauseMenu(){
    const sub=this.$('pause-sub');
    const m=Math.floor(this.gt/60),s=this.gt%60;
    const tstr=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    let label=tstr;
    if(this.mode==='campaign'&&this.lvl)label=this._practice?t('pause.subPractice',{n:this.lvl.id,t:tstr}):t('pause.subCampaign',{n:this.lvl.id,t:tstr});
    else if(this.mode==='daily')label=t('pause.subDaily',{n:this._dailyNum(),t:tstr});
    else if(this.mode==='survival')label=t('pause.subSurvival',{n:this.survN,t:tstr});
    if(sub)sub.textContent=label;
  }

  togglePause(){if(this.over||!this.running||this._tutOn)return;if(this.paused)this.unpause();else{this.paused=true;this._stopLoop();this.closeModals();this._renderPauseMenu();this.showOv('ov-pause');this._syncPauseIcon();}}

  unpause(){if(this.over||!this.running||!this.paused)return;this.paused=false;this.hideOv('ov-pause');this.lt=performance.now();this.acc=0;this._syncPauseIcon();this._scheduleLoop();}

  resetLevel(){if(!this.lvl)return;this.paused=false;this.over=false;this.hideOv('ov-pause');this.closeModals();this.$('app').classList.remove('alarm');this.showScreen('scr-gs');this._syncPauseIcon();this.acceptCase();}

  quitToLevels(){this.paused=false;this.running=false;this.over=false;this._stopLoop();this.hideOv('ov-pause');this.closeModals();this.$('app').classList.remove('alarm');this._alarmOn=false;this._syncPauseIcon();if(this.mode==='campaign')this.showLevelSelect();else this.showMainMenu();}
  toggleLog(){const l=this.$('log');l.classList.toggle('exp');this.$('lx').textContent=l.classList.contains('exp')?'▲':'▼';}

  log(t,type){const d=document.createElement('div');d.className='lm '+(type||'');d.textContent='▸ '+t;const l=this.$('log');l.appendChild(d);l.scrollTop=l.scrollHeight;while(l.children.length>50)l.removeChild(l.children[1]);}

  // -- End Game --
  endGame(win,winType){
    if(this.over)return;
    this.closeModals();this.over=true;this.running=false;this._stopLoop();this._alarmOn=false;this.$('app').classList.remove('alarm');
    const p=this.p,lv=this.lvl;
    if(!p||!lv)return;
    const mins=Math.floor(this.gt/60),secs=this.gt%60;
    let reason=!win?p.arrestReason:winType==='stabilized'?t('win.stabilized'):t('win.survived');

    const tt=this.gt||1;const mapPct=Math.round((1-p.goalMapF/tt)*100);const spoPct=Math.round((1-p.goalSpoF/tt)*100);
    const lacPts=(p.lacTrend==='↓'||p.lactate<2)?15:(p.lactate<2.5?8:0);
    const speedPts=win?Math.max(0,Math.round((300-this.gt)/30)):0;
    let score=0;
    if(win){score=Math.round(mapPct*.3+spoPct*.3+lacPts+(winType==='stabilized'?15:0)+speedPts);if(p.peakLI>40)score-=10;if(p.wrongAct>3)score-=10;}
    else score=Math.max(0,Math.round(mapPct*.15+spoPct*.15));
    score=Math.max(0,Math.min(100,score));
    const stars=win?(score>=85?3:score>=60?2:1):0;
    const grade=score>=90?'A':score>=75?'B':score>=60?'C':score>=40?'D':'F';
    const lacPct=Math.round(lacPts/15*100);
    const spdPct=Math.max(0,Math.min(100,speedPts*10));

    // Persistence & NEW BEST per mode
    let newBest=false;
    let firstClear=false;
    let starUp=false;
    let prevStars=0;
    let mxBefore=this.getMaxUnlocked();
    if(this.mode==='campaign'&&win){
      prevStars=this.getLvlData(lv.id).stars||0;
      firstClear=!prevStars;
      const prev=this.getLvlData(lv.id).score||0;
      newBest=prev>0&&score>prev;
      this.setLvlData(lv.id,stars,score);
      starUp=prevStars>0&&stars>prevStars;
    }else if(this.mode==='daily'){
      const s=this.ensureMeta(),ds=this._dailyStr(),ys=this._yesterStr();
      const hadWinToday=s.daily&&s.daily.date===ds&&s.daily.score>0;
      if(!s.dailyStreak||s.dailyStreak.last!==ds){
        s.dailyStreak={last:ds,n:(s.dailyStreak&&s.dailyStreak.last===ys)?s.dailyStreak.n+1:1};
      }
      if(win){
        const prev=(s.daily&&s.daily.date===ds)?s.daily.score:0;
        newBest=prev>0&&score>prev;
        if(!s.daily||s.daily.date!==ds||score>s.daily.score)s.daily={date:ds,score:score};
        this._dailyFirstWinToday=win&&!hadWinToday;
      }else this._dailyFirstWinToday=false;
      this._recordDailyLog(s,ds,score,win);
      if(win)this._weeklyBonusPending=this._onWeeklyDailyWin(s,ds);
      this.setSave(s);
    }else if(this.mode==='survival'){
      if(win)this.survTotal+=score;
      else{
        const s=this.ensureMeta();const cur={p:this.survN-1,s:this.survTotal};
        if(!s.survBest||cur.p>s.survBest.p||(cur.p===s.survBest.p&&cur.s>s.survBest.s)){
          if(cur.p>0)newBest=!!s.survBest;
          s.survBest=cur;this.setSave(s);
        }
      }
    }

    const improved=firstClear||starUp||newBest;
    if(win){
      if(this.mode==='campaign'&&starUp&&stars===3){this.snd.perfect();this._vib([20,28,20,28,45]);}
      else if(this.mode==='campaign'&&starUp&&stars===2){this.snd.win();this._vib([18,22,35]);}
      else if(stars===3){this.snd.perfect();this._vib([25,30,25,30,50]);}
      else{this.snd.win();this._vib([40,40,40]);}
    }else{this.snd.lose();this._vib([120,60,240]);}
    const result={mode:this.mode,win:win,score:score,stars:stars,mapPct:mapPct,spoPct:spoPct,lacPct:lacPct,timePct:spdPct,speedPts:speedPts,dn:this._dailyNum(),level:lv.id,patients:win?this.survN:this.survN-1,total:this.survTotal,starUp:!!starUp,improved:!!improved};
    this._firstClear=firstClear;
    const rkBefore=this._rankFromXp(this.ensureMeta().xp||0);
    const meta=this._awardMeta(win,score,stars,speedPts,improved);
    const rkAfter=this._rankFromXp(this.ensureMeta().xp||0);
    const rankUpHtml=rkAfter.id!==rkBefore.id?'<div class="go-rankup">▲ '+t('end.rankUp',{r:t(RANK_I18N[rkAfter.id])})+'</div>':'';
    const firstClearHtml=firstClear&&win?'<div class="go-rankup" style="border-color:rgba(0,255,136,.4);color:var(--g)">'+t('end.firstClear')+'</div>':'';
    const starUpHtml=starUp&&stars<3?'<div class="go-rankup" style="border-color:rgba(255,204,0,.4);color:var(--y)">'+t('end.starUp',{stars:'★'.repeat(stars)})+'</div>':'';
    const perfectHtml=win&&stars===3?'<div class="go-perfect">'+(starUp&&prevStars>0?t('end.starUp3'):t('end.perfect3'))+'</div>':'';
    const practiceHtml=this._practice&&win&&!improved?'<div class="go-sub" style="color:var(--tm);letter-spacing:2px">'+t('end.practice')+'</div>':'';
    const winStreak=this.ensureMeta().winStreak||0;
    const streakHtml=win&&winStreak>=3?'<div class="go-rankup" style="border-color:rgba(255,136,51,.35);color:var(--o)">🔥 '+t('end.winStreak',{n:winStreak})+'</div>':'';
    const mxAfter=this.getMaxUnlocked();
    let unlockHtml='';
    if(this.mode==='campaign'&&win&&mxAfter>mxBefore){
      const keys=Object.keys(UNLOCKS).filter(k=>UNLOCKS[k]===mxAfter);
      if(keys.length)unlockHtml='<div class="go-unlock">🔓 '+t('unlock.new')+': '+keys.map(k=>t('unlock.'+k)).join(' · ')+'</div>';
    }
    const weeklyBonus=(this.mode==='daily'&&win)?(this._weeklyBonusPending||0):0;
    this._weeklyBonusPending=0;
    const missionBonus=this._checkMissions(result);
    const achBonus=this._checkAchievements(result,result);
    const totalCoins=meta.coins+missionBonus+achBonus+weeklyBonus;
    const coinsHtml=totalCoins>0?'<div class="go-coins">+'+totalCoins+' 🪙 ICU Coins'+(meta.xp>0?' · +'+meta.xp+' XP':'')+(missionBonus>0?' · '+t('end.missionBonus'):'')+'</div>':'';

    const names=p.pathKeys.map(k=>{const x=getPathEntry(k,PATH);return x?x.name:k;}).join(' + ');
    const descs=p.pathKeys.map(k=>{const x=getPathEntry(k,PATH);return x?x.desc:'';}).join('\n\n');
    const neStr=p.norepiCum>0?Math.round(p.norepiCum)+'s':t('end.neNone');

    // Educational debrief: your actions vs ideal management
    const db=[];
    const pk=p.pathKeys;
    if(pk.includes('edema'))db.push(p.totalFluids>500?t('db.edemaBad',{n:p.totalFluids}):(p.diureticsGiven>0?t('db.edemaGood'):t('db.edemaMiss')));
    if(pk.includes('airway'))db.push(p.goodSuctions>0?t('db.airwayGood'):t('db.airwayMiss'));
    if(pk.includes('sepsis'))db.push(p.abxGiven&&p._abxWorks?t('db.sepsisGood'):t('db.sepsisMiss'));
    if(pk.includes('pe'))db.push(p.anticoagOn?t('db.peGood'):t('db.peMiss'));
    if(pk.includes('copd'))db.push(p._bronchGiven||p.tidalVolume<6?t('db.copdGood'):t('db.copdMiss'));
    if(pk.includes('hypovolemic'))db.push((p.totalFluids>=1000||p.transfusions>=2)?t('db.hypoGood'):t('db.hypoMiss'));
    if(pk.includes('cardiogenic'))db.push(p.totalFluids>1000?t('db.cardioBad'):((p.norepiCum>0||p.dobuOn||p._dobuFx>0)?t('db.cardioGood'):t('db.cardioMiss')));
    if(pk.includes('rvfail'))db.push(p.totalFluids>500?t('db.rvBad'):(p.diureticsGiven>0?t('db.rvGood'):t('db.rvMiss')));
    if(pk.includes('anaphylaxis'))db.push((p._epiGiven||(p._bronchGiven&&p.norepiCum>0))?t('db.anaGood'):t('db.anaMiss'));
    if(pk.includes('tamponade'))db.push(p.drained?t('db.tampDrained'):(p.peep>8?t('db.tampBad'):t('db.tampGood')));
    if(p.wrongAct>=3)db.push(t('db.wrong',{n:p.wrongAct}));
    const dbHtml=db.length?'<div class="go-debrief"><strong>'+t('db.title')+'</strong><br>'+db.slice(0,3).map(x=>'▸ '+x).join('<br>')+'</div>':'';

    // Component bars
    const bar=(label,pct)=>{const cls=pct>=85?'':pct>=50?' mid':' low';return '<div class="go-bar"><span>'+label+'</span><div class="go-bar-t"><div class="go-bar-f'+cls+'" data-w="'+pct+'"></div></div><b>'+pct+'%</b></div>';};
    const barsHtml='<div class="go-bars">'+bar('MAP',mapPct)+bar('SpO₂',spoPct)+bar('Lac',lacPct)+(win?bar('⏱',spdPct):'')+'</div>';

    // 3-star hint
    let hintHtml='';
    if(win&&stars<3){
      const comps=[{k:'hint.map',v:mapPct},{k:'hint.spo2',v:spoPct},{k:'hint.lac',v:lacPct},{k:'hint.speed',v:spdPct}];
      comps.sort((a,b)=>a.v-b.v);
      hintHtml='<div class="go-hint">'+t('end.hint3',{x:t(comps[0].k)})+'</div>';
    }
    const bestHtml=newBest?'<div class="go-best">'+t('end.newBest')+'</div>':'';

    // Title & survival line
    let title=win?t('end.win'):t('end.lose');
    if(this.mode==='survival')title=win?t('end.survWin',{n:this.survN}):t('end.survOver');
    let survLine='';
    let dailyLine='';
    if(this.mode==='survival'){
      survLine='<div class="go-sub" style="color:var(--cy)">'+(win?'':t('end.survSummary',{p:this.survN-1})+' | ')+t('end.survTotal',{s:this.survTotal})+'</div>';
    }else if(this.mode==='daily'){
      const ds=this._dailyStr();
      const sd=this.ensureMeta().daily;
      const best=sd&&sd.date===ds?sd.score:score;
      const yEntry=(this.ensureMeta().dailyLog||[]).find(x=>x.d===this._yesterStr());
      let vsY='';
      if(yEntry&&yEntry.s>0){
        const delta=score-yEntry.s;
        vsY=' · '+t('end.dailyVsYesterday',{delta:(delta>=0?'+':'')+delta});
      }
      dailyLine='<div class="go-sub" style="color:var(--y)">'+t('end.dailyLine',{n:this._dailyNum(),best:best})+(this._dailyTag?' · '+this._dailyTag:'')+vsY+'</div>';
    }

    // Result snapshot for sharing
    this._lastResult=result;
    const shareBtn='<div class="go-btn share" id="share-btn" onclick="G.shareResult()">'+t('end.share')+'</div>';

    // Buttons per mode
    let btns;
    if(this.mode==='survival'){
      btns='<div class="go-btn" onclick="G.goLS()">'+t('end.menu')+'</div>'+shareBtn+
        (win?'<div class="go-btn pri" onclick="G.nextSurvival()">'+t('end.nextPatient')+'</div>'
            :'<div class="go-btn pri" onclick="G.startSurvival()">'+t('end.retry')+'</div>');
    }else if(this.mode==='daily'){
      btns='<div class="go-btn" onclick="G.goLS()">'+t('end.menu')+'</div>'+shareBtn+
        '<div class="go-btn pri" onclick="G.startDaily()">'+t('end.retry')+'</div>';
    }else{
      btns='<div class="go-btn" onclick="G.goLS()">'+t('end.levels')+'</div>'+
        (win&&lv.id<30?'<div class="go-btn pri" onclick="G.startLevel('+(lv.id+1)+')">'+t('end.next')+'</div>':
          '<div class="go-btn pri" onclick="G.startLevel('+lv.id+')">'+t('end.retry')+'</div>');
    }

    const c=this.$('ov-end-c');
    if(!c)return;
    let goStarCls='go-stars';
    if(win){
      goStarCls+=' win-anim';
      if(stars===3)goStarCls+=starUp&&prevStars>0?' star-up-3':' perfect-stars';
      else if(starUp)goStarCls+=' star-up-stars';
    }
    let starsHtml='';
    for(let i=0;i<3;i++){
      const filled=i<stars;
      const newly=starUp&&i>=prevStars&&i<stars;
      if(newly)starsHtml+='<span class="star-new">'+(filled?'★':'☆')+'</span>';
      else starsHtml+=(filled?'★':'☆');
    }
    c.innerHTML='<div class="go-t '+(win?'win':'lose')+'">'+title+'</div>'+
      '<div class="go-sub">'+reason+'</div>'+
      bestHtml+
      rankUpHtml+
      firstClearHtml+
      starUpHtml+
      perfectHtml+
      practiceHtml+
      streakHtml+
      unlockHtml+
      coinsHtml+
      (this.mode==='survival'?'':'<div class="'+goStarCls+'">'+starsHtml+'</div>')+
      survLine+
      dailyLine+
      barsHtml+
      hintHtml+
      dbHtml+
      '<div class="go-diag"><strong>'+t('end.diagnosis')+'</strong> '+names+'<br><br>'+descs.replace(/\n/g,'<br>')+'</div>'+
      '<div class="go-stats">'+t('end.time',{m:mins,s:secs,grade:grade,score:'<b id="go-score">0</b>'})+'<br>'+
      t('end.fluids',{n:p.totalFluids,ne:neStr})+'<br>'+
      t('end.suctions',{ok:p.goodSuctions,bad:p.badSuctions,n:p.diureticsGiven})+'<br>'+
      t('end.peak',{lac:p.peakLac.toFixed(1),li:Math.round(p.peakLI)})+'</div>'+
      '<div class="go-btns">'+btns+'</div>';
    this.showOv('ov-end');
    if(win&&stars===3)this._spawnConfetti(this.$('ov-end'),starUp&&prevStars>0?14:22);
    else if(win&&starUp&&stars===2)this._spawnConfetti(this.$('ov-end'),10);

    if(missionBonus>0)setTimeout(()=>this._toastMsg(t('end.missionDone',{n:missionBonus})),700);
    if(starUp&&stars===2)setTimeout(()=>this._toastMsg(t('end.starUp2')),missionBonus>0?1200:700);
    if(this.mode==='daily'&&win&&this._dailyFirstWinToday){
      const stk=this.ensureMeta().dailyStreak?this.ensureMeta().dailyStreak.n:1;
      setTimeout(()=>this._toastMsg(t('end.dailyStreak',{n:stk})),missionBonus>0?1400:800);
    }
    if(weeklyBonus>0)setTimeout(()=>this._toastMsg(t('end.weeklyBonus',{n:weeklyBonus})),missionBonus>0?2000:1200);
    if(this.mode==='survival'&&win&&[3,5,8,10].includes(this.survN)){
      setTimeout(()=>this._toastMsg(t('end.survMilestone',{n:this.survN})),900);
    }
    if(this.mode==='campaign'&&win&&firstClear&&[5,10,15,20,25,30].includes(lv.id)){
      const tier=LS_TIERS.find(ti=>ti.r===lv.id);
      if(tier){
        this._lsPulseTier=LS_TIERS.indexOf(tier);
        setTimeout(()=>this._toastMsg('🏁 '+t('end.tierClear',{tier:t(tier.i18n)})),1200);
      }
    }

    // Animate: bars grow + score counts up
    requestAnimationFrame(()=>{
      c.querySelectorAll('.go-bar-f').forEach(el=>{el.style.width=el.dataset.w+'%';});
      const se=this.$('go-score');
      if(se){
        const t0=performance.now();
        const an=now=>{const k=Math.min(1,(now-t0)/900);se.textContent=Math.round(score*k);if(k<1&&this.over)requestAnimationFrame(an);};
        requestAnimationFrame(an);
      }
    });
  }

  goLS(){this.hideOv('ov-end');if(this.mode==='campaign')this.showLevelSelect();else this.showMainMenu();}
}

const G=new Game();
let _rzT;
window.addEventListener('resize',()=>{
  clearTimeout(_rzT);
  _rzT=setTimeout(()=>{
    G._resetWave();
    ['modal-fio2:bfio2','modal-peep:bpeep','modal-vt:bvt','modal-diag:bdiag','modal-meds:bmeds'].forEach(pair=>{
      const [mid,bid]=pair.split(':');
      if(G.$(mid)?.classList.contains('v'))G.positionModal(mid,bid);
    });
    if(G.$('modal-backdrop')?.classList.contains('v'))G._showBackdrop();
  },150);
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    G._stopLoop();
    if(G.running&&!G.over&&!G.paused)G.lt=performance.now();
  }else if(G.running&&!G.over&&!G.paused){
    G.lt=performance.now();
    G._scheduleLoop();
  }
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
</script>
