<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>ICU Crisis — Clinical Reasoning Game</title>
<meta name="description" content="Diagnose and stabilize ICU patients in real time. Pure clinical reasoning under pressure: ventilator, vasopressors, diagnostics. No spoilers.">
<meta name="theme-color" content="#030608">
<meta property="og:title" content="ICU Crisis — Clinical Reasoning Game">
<meta property="og:description" content="Diagnose and stabilize ICU patients in real time. Pure clinical reasoning under pressure. Can you keep them alive?">
<meta property="og:image" content="https://chriseg0996-star.github.io/icu-crisis/og.png">
<meta property="og:url" content="https://chriseg0996-star.github.io/icu-crisis/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="fonts.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030608;--p:#0a1019;--c:#0d1520;--b:#1a2a3a;--g:#00ff88;--gd:#00aa55;--y:#ffcc00;--r:#ff3344;--cy:#00ddff;--o:#ff8833;--td:#4a6a7a;--tm:#7a9aaa;--w:#e0f0f8;--fm:'Share Tech Mono','Courier New',monospace;--fd:'Orbitron','Share Tech Mono',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--fm);color:var(--w);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* === SCREENS === */
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.screen:not(.active){display:none!important;content-visibility:hidden}

/* === MAIN MENU === */
.mm{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative;min-height:100vh}
.mm::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,221,255,.07) 0%,transparent 55%);pointer-events:none}
.mm-top{display:none;position:absolute;top:0;left:0;right:0;justify-content:flex-end;padding:max(10px,env(safe-area-inset-top)) 12px 10px;z-index:3;pointer-events:none}
#scr-mm.active .mm-top{display:flex}
.mm-lang{display:flex;gap:2px;background:rgba(10,16,25,.97);border:1px solid var(--b);border-radius:20px;padding:3px;pointer-events:auto}
.lang-btn{padding:5px 11px;border:none;background:transparent;color:var(--td);font-family:var(--fd);font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:14px;transition:all .15s;-webkit-user-select:none;user-select:none;min-height:28px;line-height:1}
.lang-btn.on{color:var(--cy);background:rgba(0,221,255,.12);box-shadow:0 0 8px rgba(0,221,255,.08)}
.lang-btn:active{transform:scale(.95)}
.mm-scroll{flex:1;overflow-y:auto;overflow-x:hidden;width:100%;max-width:400px;margin:0 auto;padding:44px 16px 8px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;justify-content:center}
.mm-hero{text-align:center;padding:4px 0 0}
.mm-ecg-deco{width:100%;height:22px;margin-bottom:4px;opacity:.45}
.mm-ecg-deco svg{width:100%;height:100%}
.mm-title{font-family:var(--fd);font-size:clamp(24px,6.5vw,38px);font-weight:900;letter-spacing:clamp(3px,1.5vw,6px);color:var(--cy);line-height:1.1;text-shadow:0 0 20px rgba(0,221,255,.2)}
.mm-sub{font-family:var(--fd);font-size:9px;letter-spacing:3px;color:var(--td);text-transform:uppercase;margin-top:4px}
.mm-desc{display:none}
.mm-strip{font-size:9px;color:var(--tm);text-align:center;line-height:1.5;padding:0 4px}
.mm-strip b{color:var(--cy);font-weight:400;font-family:var(--fd);letter-spacing:1px}
.mm-strip .mc{color:var(--y)}
.mm-actions{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px}
.mm-btn{width:100%;padding:14px 20px;border:1px solid var(--cy);background:linear-gradient(180deg,rgba(0,221,255,.1) 0%,rgba(0,221,255,.04) 100%);color:var(--cy);font-family:var(--fd);font-size:12px;letter-spacing:4px;cursor:pointer;border-radius:10px;transition:all .2s;-webkit-user-select:none;user-select:none;min-height:46px;box-shadow:0 4px 16px rgba(0,221,255,.08)}
.mm-btn:hover{border-color:var(--g);color:var(--g);background:linear-gradient(180deg,rgba(0,255,136,.1) 0%,rgba(0,255,136,.04) 100%)}
.mm-btn:active{transform:scale(.98)}
.mm-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mm-mode-card{border:1px solid var(--b);background:var(--c);padding:11px 8px 10px;border-radius:10px;cursor:pointer;text-align:center;transition:all .15s;-webkit-user-select:none;user-select:none;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.mm-mode-card:active{transform:scale(.97)}
.mm-mode-card:hover{border-color:var(--cy);background:rgba(0,221,255,.04)}
.mm-mode-card.daily{border-color:rgba(255,204,0,.22)}
.mm-mode-card .mmc-icon{font-size:18px;line-height:1}
.mm-mode-card .mmc-label{font-family:var(--fd);font-size:7px;letter-spacing:2px;color:var(--tm)}
.mmc-meta{display:block;font-size:6px;color:var(--td);letter-spacing:.5px;margin-top:3px;line-height:1.35;max-width:100%}
.mm-mode-card.daily .mmc-meta{color:rgba(255,204,0,.65)}
.mm-links{display:flex;align-items:center;justify-content:center;gap:16px;padding:2px 0}
.mm-link{background:none;border:none;color:var(--td);font-family:var(--fd);font-size:8px;letter-spacing:2px;cursor:pointer;padding:4px 2px;transition:color .15s;-webkit-user-select:none;user-select:none}
.mm-link:hover{color:var(--cy)}
.mm-extra-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border:1px solid var(--b);border-radius:10px;background:rgba(10,16,25,.35);cursor:pointer;color:var(--td);font-family:var(--fd);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;-webkit-user-select:none;user-select:none;transition:border-color .15s,background .15s}
.mm-extra-toggle:hover{border-color:rgba(0,221,255,.25);background:rgba(0,221,255,.03)}
.mm-extra-toggle .ar{font-size:8px;opacity:.6;transition:transform .2s}
.mm-extra-toggle.open .ar{transform:rotate(180deg)}
.mm-extra{display:none;flex-direction:column;gap:8px;margin-top:-4px}
.mm-extra.open{display:flex}
.mm-missions{width:100%;padding:9px 12px;border:1px solid var(--b);border-radius:10px;background:rgba(10,16,25,.5)}
.mm-missions-title{font-size:7px;letter-spacing:2px;color:var(--td);margin-bottom:5px;text-transform:uppercase}
.mm-mission{font-size:8px;color:var(--tm);padding:3px 0;border-bottom:1px solid rgba(26,42,58,.45);display:flex;justify-content:space-between;gap:8px;line-height:1.35}
.mm-mission:last-child{border:none;padding-bottom:0}
.mm-mission.done{color:var(--g)}
.mm-mission .mr{color:var(--y);flex-shrink:0;font-size:7px}
.mm-weekly{width:100%;padding:9px 12px;border:1px solid rgba(255,204,0,.22);border-radius:10px;background:rgba(255,204,0,.04)}
.mm-weekly-title{font-size:7px;letter-spacing:2px;color:var(--y);margin-bottom:5px;text-transform:uppercase}
.mm-weekly-prog{font-size:8px;color:var(--tm);display:flex;justify-content:space-between;gap:8px;line-height:1.35}
.mm-weekly-prog.done{color:var(--g)}
.mm-weekly-bar{height:3px;border-radius:2px;background:rgba(26,42,58,.6);margin-top:5px;overflow:hidden}
.mm-weekly-bar-f{height:100%;background:linear-gradient(90deg,var(--y),var(--g));border-radius:2px;transition:width .3s}
.prof-daily-sum{font-size:7px;color:var(--td);margin-top:5px;letter-spacing:.5px}
.mm-streak-cal{display:flex;gap:3px;justify-content:center;padding:8px 10px;border:1px solid var(--b);border-radius:10px;background:rgba(10,16,25,.35)}
.mm-streak-day{flex:1;max-width:34px;text-align:center;font-size:6px;color:var(--td)}
.mm-streak-day .sd{width:20px;height:20px;border-radius:50%;border:1px solid var(--b);margin:0 auto 2px;display:flex;align-items:center;justify-content:center;font-size:8px}
.mm-streak-day.on .sd{border-color:var(--g);background:rgba(0,255,136,.1);color:var(--g)}
.mm-streak-day.today .sd{border-color:var(--cy)}
.mm-footer{flex-shrink:0;padding:8px 16px max(12px,env(safe-area-inset-bottom));text-align:center}
.mm-credit{font-size:8px;color:var(--td);letter-spacing:.5px}
.mm-disclaimer{display:none}
.meta-panel{max-width:340px;width:92%;max-height:85vh;overflow-y:auto;background:var(--p);border:1px solid var(--b);border-radius:10px;padding:16px;margin:auto}
.meta-panel-h{font-family:var(--fd);font-size:14px;letter-spacing:3px;color:var(--cy);text-align:center;margin-bottom:12px}
.meta-close{display:block;width:100%;margin-top:12px;padding:10px;border:1px solid var(--b);background:var(--c);color:var(--tm);font-family:var(--fd);font-size:10px;letter-spacing:2px;cursor:pointer;border-radius:6px}
.meta-row{display:flex;justify-content:space-between;font-size:9px;color:var(--tm);padding:5px 0;border-bottom:1px solid rgba(26,42,58,.4)}
.meta-row b{color:var(--w)}
.prof-section{margin:10px 0 4px}
.prof-label{font-size:7px;letter-spacing:2px;color:var(--td);text-transform:uppercase;margin-bottom:6px}
.prof-lv-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.prof-lv{aspect-ratio:1;min-height:28px;border:1px solid var(--b);border-radius:4px;background:var(--c);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--fd);font-size:8px;color:var(--w);line-height:1}
.prof-lv.locked{opacity:.3;color:var(--td)}
.prof-lv.done{border-color:var(--gd)}
.prof-lv.perf{border-color:var(--y);box-shadow:0 0 6px rgba(255,204,0,.12)}
.prof-lv .ps{font-size:5px;color:var(--y);letter-spacing:-1px;margin-top:1px}
.prof-ach{display:flex;flex-wrap:wrap;gap:4px}
.prof-ach span{font-size:7px;padding:3px 6px;border:1px solid rgba(0,255,136,.25);border-radius:4px;color:var(--g);line-height:1.3}
.prof-ach span.off{opacity:.32;color:var(--td);border-color:var(--b);border-style:dashed}
.prof-daily-log{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.prof-daily-day{flex:1;min-width:0;text-align:center;padding:5px 2px;border:1px solid var(--b);border-radius:6px;background:rgba(10,16,25,.45)}
.prof-daily-day.today{border-color:rgba(0,221,255,.35)}
.prof-daily-day .pd{font-family:var(--fd);font-size:8px;color:var(--y);line-height:1.2}
.prof-daily-day .pd.miss{color:var(--td);font-size:7px}
.prof-daily-day .pd.win{color:var(--g)}
.prof-daily-day .pdl{font-size:5px;color:var(--td);margin-top:2px}
.prof-tier-strip{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:4px}
.prof-tier-chip{font-family:var(--fd);font-size:6px;padding:3px 5px;border:1px solid var(--b);border-radius:4px;color:var(--tm);letter-spacing:.5px}
.prof-tier-chip.done{border-color:rgba(0,255,136,.25);color:var(--g)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.shop-item{border:1px solid var(--b);border-radius:8px;padding:8px;background:var(--c);cursor:pointer;text-align:center;transition:border-color .15s;position:relative}
.shop-item.owned{border-color:var(--gd)}
.shop-item.equipped{border-color:var(--cy);box-shadow:0 0 8px rgba(0,221,255,.15)}
.shop-item.locked{opacity:.45;pointer-events:none}
.shop-item.premium{border-color:var(--y)}
.shop-item-name{font-size:8px;color:var(--tm);margin-top:4px;line-height:1.3}
.shop-item-price{font-size:9px;color:var(--y);margin-top:2px}
.shop-preview{height:36px;display:flex;align-items:center;justify-content:center;font-size:20px}
.shop-tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.shop-tab{padding:5px 10px;border:1px solid var(--b);background:var(--c);color:var(--td);font-size:8px;letter-spacing:1px;cursor:pointer;border-radius:4px}
.shop-tab.on{border-color:var(--cy);color:var(--cy)}
.ach-toast{position:fixed;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-120%);z-index:200;background:var(--p);border:1px solid var(--y);border-radius:8px;padding:10px 16px;font-size:10px;color:var(--y);letter-spacing:1px;transition:transform .35s ease;pointer-events:none;max-width:90%;text-align:center}
.ach-toast.v{transform:translateX(-50%) translateY(0)}
.go-coins{font-size:11px;color:var(--y);margin:6px 0;letter-spacing:1px}

/* === LEVEL SELECT (campaign map) === */
.ls{display:flex;flex-direction:column;height:100%;overflow:hidden;background:var(--bg);position:relative}
.ls::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 24px,rgba(0,221,255,.015) 24px,rgba(0,221,255,.015) 25px);pointer-events:none}
.ls-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;padding-top:max(10px,env(safe-area-inset-top));background:var(--p);border-bottom:1px solid var(--b);flex-shrink:0;position:relative;z-index:1}
.ls-back{display:flex;align-items:center;gap:4px;min-height:44px;padding:0 10px;border:1px solid var(--b);border-radius:8px;background:var(--c);color:var(--tm);font-family:var(--fd);font-size:8px;letter-spacing:1px;cursor:pointer;flex-shrink:0;-webkit-user-select:none;user-select:none}
.ls-back:active{transform:scale(.96);border-color:var(--cy);color:var(--cy)}
.ls-heading{flex:1;font-family:var(--fd);font-size:10px;letter-spacing:3px;color:var(--y);text-transform:uppercase;text-align:center}
.ls-stars-total{font-family:var(--fd);font-size:9px;color:var(--y);letter-spacing:1px;flex-shrink:0;min-width:52px;text-align:right}
.ls-body{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;padding:12px 14px max(16px,env(safe-area-inset-bottom));position:relative;z-index:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ls-continue{width:100%;padding:13px 16px;border:1px solid rgba(255,204,0,.45);border-radius:10px;background:linear-gradient(180deg,rgba(255,204,0,.12) 0%,rgba(255,204,0,.04) 100%);color:var(--y);font-family:var(--fd);font-size:10px;letter-spacing:2px;cursor:pointer;flex-shrink:0;-webkit-user-select:none;user-select:none;min-height:46px;box-shadow:0 4px 14px rgba(255,204,0,.08)}
.ls-continue:active{transform:scale(.98)}
.ls-continue.hide{display:none}
.ls-progress-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
.ls-progress-bar{flex:1;height:6px;border-radius:3px;background:var(--c);border:1px solid var(--b);overflow:hidden}
.ls-progress-fill{height:100%;width:0;background:linear-gradient(90deg,rgba(255,204,0,.5),var(--y));border-radius:2px;transition:width .35s ease}
.ls-progress-label{font-family:var(--fd);font-size:8px;color:var(--td);letter-spacing:1px;flex-shrink:0;min-width:36px;text-align:right}
.ls-tabs{display:flex;gap:4px;overflow-x:auto;flex-shrink:0;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ls-tabs::-webkit-scrollbar{display:none}
.ls-tab{flex:1;min-width:42px;padding:8px 4px;border:1px solid var(--b);border-radius:8px;background:var(--c);color:var(--td);font-family:var(--fd);font-size:9px;letter-spacing:1px;cursor:pointer;text-align:center;-webkit-user-select:none;user-select:none;transition:border-color .15s,background .15s}
.ls-tab.on{border-color:var(--cy);color:var(--cy);background:rgba(0,221,255,.06)}
.ls-tab.locked{opacity:.4}
.ls-tab.tier-pulse{animation:lsTierPulse 1.2s ease-in-out 3;border-color:var(--g);color:var(--g)}
@keyframes lsTierPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px 2px rgba(0,255,136,.35)}}
.ls-tab:active{transform:scale(.96)}
.ls-hint{font-size:9px;color:var(--cy);text-align:center;padding:10px 12px;border:1px solid rgba(0,221,255,.35);border-radius:8px;background:rgba(0,221,255,.07);line-height:1.45;flex-shrink:0;letter-spacing:.3px}
.ls-hint.hide{display:none}
.ls-panel{flex-shrink:0}
.ls-tier-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:8px}
.ls-tier-name{font-size:8px;letter-spacing:2px;color:var(--tm);text-transform:uppercase}
.ls-tier-meta{font-size:7px;color:var(--td);letter-spacing:1px;flex-shrink:0}
.ls-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ls-btn{aspect-ratio:1;min-height:52px;border:1px solid var(--b);border-radius:8px;background:var(--c);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;-webkit-user-select:none;user-select:none}
.ls-btn:active{transform:scale(.94)}
.ls-btn .ls-num{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--w);line-height:1}
.ls-btn .ls-stars{font-size:7px;color:var(--y);margin-top:3px;height:10px;line-height:1}
.ls-btn .ls-score{font-size:5px;color:var(--tm);margin-top:1px;font-family:var(--fd);letter-spacing:.5px}
.ls-btn.practice-replay{border-style:dashed;border-color:rgba(0,221,255,.25)}
.ls-btn.locked{opacity:.45}
.ls-btn.locked .ls-num{font-size:12px;color:var(--td)}
.ls-btn.completed{border-color:var(--gd)}
.ls-btn.perfect{border-color:var(--y);box-shadow:0 0 8px rgba(255,204,0,.15)}
.ls-btn.next{border-color:var(--cy);box-shadow:0 0 10px rgba(0,221,255,.2);animation:lsPulse 2s ease-in-out infinite}
@keyframes lsPulse{0%,100%{box-shadow:0 0 6px rgba(0,221,255,.15)}50%{box-shadow:0 0 14px rgba(0,221,255,.35)}}

/* === GAME SCREEN === */
.gs{background:var(--bg);height:100%;overflow:hidden}
#app.alarm .gs{box-shadow:inset 0 0 28px 2px rgba(255,51,68,.14)}
@media (max-height:640px){
  .bv .vv{font-size:30px}
  .ecg-strip{height:38px}
  .bv{padding:7px 10px 6px}
  .ab{min-height:40px;max-height:40px;padding:5px 2px}
  .log{padding:2px 6px 4px}
}
@media (prefers-reduced-motion:reduce){
  #app.alarm .gs,.bv.cr::after,.stab-wrap.near .stab-fill,.go-stars,.confetti-p,.ls-btn.next,.pb.x,.lm.d{animation:none!important}
  .bv .vv,.stab-fill,.ab{transition:none}
}

.gs-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:max(5px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) 5px max(10px,env(safe-area-inset-left));background:var(--p);border-bottom:1px solid var(--b);flex-shrink:0;gap:6px}
.hdr-left{display:flex;align-items:center;gap:5px;min-width:0;flex:1}
.hdr-lvl{font-family:var(--fd);font-size:9px;color:var(--cy);letter-spacing:2px;flex-shrink:0}
.hdr-prob{display:flex;gap:4px;min-width:0;overflow:hidden}
.pb{font-size:7px;padding:2px 5px;border-radius:3px;letter-spacing:1px;font-family:var(--fm);flex-shrink:0}
.pb.s{border:1px solid var(--gd);color:var(--g)}.pb.d{border:1px solid var(--y);color:var(--y)}.pb.u{border:1px solid var(--o);color:var(--o)}.pb.x{border:1px solid var(--r);color:var(--r)}
.hdr-timer{font-family:var(--fd);font-size:12px;color:var(--g);letter-spacing:2px;min-width:44px;text-align:right}
.hdr-surv{font-family:var(--fd);font-size:8px;color:var(--y);letter-spacing:1px;flex-shrink:0}
.evt-banner{position:absolute;top:46px;left:8px;right:8px;z-index:35;padding:9px 12px;border:1px solid rgba(255,51,68,.55);border-radius:8px;background:rgba(28,6,10,.94);color:var(--r);font-family:var(--fd);font-size:9px;letter-spacing:1px;text-align:center;line-height:1.4;transform:translateY(-130%);opacity:0;transition:transform .35s ease,opacity .35s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.evt-banner.v{transform:translateY(0);opacity:1}
.pbb-meta{font-size:8px;color:var(--y);letter-spacing:1px;text-align:center;margin:-2px 0 10px;font-family:var(--fd);line-height:1.45}
.go-unlock{margin:6px 0;padding:7px 10px;border:1px solid rgba(0,255,136,.35);border-radius:6px;background:rgba(0,255,136,.06);color:var(--g);font-size:9px;line-height:1.5;letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.stab-wrap{display:none;padding:5px 10px 6px;background:var(--p);border-bottom:1px solid var(--b);flex-shrink:0}
.stab-wrap.on{display:block}
.stab-lbl{display:flex;justify-content:space-between;font-size:7px;color:var(--td);letter-spacing:1px;margin-bottom:4px}
.stab-lbl b{color:var(--g);font-weight:400;font-family:var(--fd)}
.stab-bar{height:5px;border-radius:3px;background:var(--c);border:1px solid var(--b);overflow:hidden}
.stab-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gd),var(--g));transition:width .25s ease;border-radius:2px}
.stab-fill.ready{box-shadow:0 0 8px rgba(0,255,136,.4)}
.stab-wrap.near .stab-fill{background:linear-gradient(90deg,var(--gd),var(--g))}
.stab-wrap.near .stab-lbl b{color:var(--g);text-shadow:0 0 6px rgba(0,255,136,.35)}
.mon.stab-flash{animation:stabFlash .65s ease-out}
@keyframes stabFlash{0%{box-shadow:0 0 0 0 rgba(0,255,136,.55),inset 0 0 20px rgba(0,255,136,.15)}100%{box-shadow:none}}
.go-stars.win-anim{animation:starPop .55s cubic-bezier(.34,1.4,.64,1)}
.go-stars.perfect-stars{color:var(--y);text-shadow:0 0 12px rgba(255,204,0,.55),0 0 24px rgba(255,204,0,.25);animation:starPop .55s cubic-bezier(.34,1.4,.64,1),starGlow 1.4s ease-in-out .4s 2}
.go-stars.star-up-3{color:var(--y);text-shadow:0 0 10px rgba(255,204,0,.45);animation:starPop .55s cubic-bezier(.34,1.4,.64,1),starGlow 1.2s ease-in-out .3s 1}
.go-stars.star-up-stars{color:var(--cy);text-shadow:0 0 8px rgba(0,221,255,.35);animation:starPop .55s cubic-bezier(.34,1.4,.64,1)}
.go-stars .star-new{display:inline-block;color:var(--y);animation:starNewPop .7s cubic-bezier(.34,1.4,.64,1)}
@keyframes starNewPop{0%{transform:scale(0) rotate(-40deg);opacity:0}60%{transform:scale(1.35) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes starGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
.go-perfect{margin:6px 0;padding:8px 12px;border:1px solid rgba(255,204,0,.55);border-radius:6px;background:linear-gradient(90deg,rgba(255,204,0,.12),rgba(0,255,136,.08));color:var(--y);font-family:var(--fd);font-size:10px;letter-spacing:3px;animation:starPop .5s ease}
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
#ov-end-c{position:relative;z-index:2}
.confetti-p{position:absolute;top:-6px;width:5px;height:9px;border-radius:1px;opacity:.9;animation:confFall 1.1s ease-out forwards}
@keyframes confFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes starPop{0%{transform:scale(.4);opacity:0;letter-spacing:0}100%{transform:scale(1);opacity:1;letter-spacing:4px}}
.go-rankup{margin:6px 0;padding:7px 10px;border:1px solid rgba(255,204,0,.4);border-radius:6px;background:rgba(255,204,0,.08);color:var(--y);font-family:var(--fd);font-size:9px;letter-spacing:2px;animation:starPop .5s ease}
.pfab{width:26px;height:26px;border-radius:50%;border:1px solid var(--b);background:var(--c);color:var(--tm);font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;-webkit-user-select:none;user-select:none}
.pfab:active{transform:scale(.92);border-color:var(--cy);color:var(--cy)}

.ptag{padding:2px 6px;border-radius:3px;font-family:var(--fd);font-size:6px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.ptag.hemo{background:rgba(255,51,68,.1);color:var(--r);border:1px solid rgba(255,51,68,.25)}
.ptag.oxy{background:rgba(0,221,255,.08);color:var(--cy);border:1px solid rgba(0,221,255,.2)}
.ptag.airway{background:rgba(255,136,51,.08);color:var(--o);border:1px solid rgba(255,136,51,.2)}
.ptag.ok{background:rgba(0,255,136,.06);color:var(--g);border:1px solid rgba(0,255,136,.15)}
.ptag.sec{opacity:.55;font-weight:400;font-size:5px}

/* Vitals monitor — fixed layout, no jump when tags update */
.mon{flex-shrink:0;margin:6px 8px 4px;border:1px solid var(--b);border-radius:10px;background:linear-gradient(180deg,#060b12 0%,#030608 100%);overflow:hidden;box-shadow:inset 0 1px 0 rgba(0,221,255,.06);contain:layout style}
.mon-tags{display:flex;gap:3px;flex-wrap:nowrap;align-items:center;height:22px;padding:0 8px;border-top:1px solid rgba(26,42,58,.5);overflow-x:auto;overflow-y:hidden;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mon-tags::-webkit-scrollbar{display:none}
.mon-tags:empty{visibility:hidden}
.mon-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b)}
.ecg-strip{position:relative;height:46px;background:#020508;border-top:1px solid rgba(26,42,58,.6);overflow:hidden;flex-shrink:0;contain:strict}
.ecg-strip canvas{display:block;width:100%;height:100%}
.mon.theme-cyan{background:linear-gradient(180deg,#061018 0%,#030608 100%)}
.mon.theme-cyan .ecg-strip canvas{filter:none}
.mon.theme-amber{background:linear-gradient(180deg,#100c06 0%,#030608 100%)}
.mon.theme-amber .ecg-strip canvas{filter:none}
.mon.theme-red{background:linear-gradient(180deg,#100608 0%,#030608 100%)}
.mon.theme-red .ecg-strip canvas{filter:none}
.mon.cos-fr-silver{box-shadow:inset 0 1px 0 rgba(0,221,255,.06),0 0 0 2px #aaa,0 0 14px rgba(170,170,170,.18)}
.mon.cos-fr-gold{box-shadow:inset 0 1px 0 rgba(0,221,255,.06),0 0 0 2px #ffcc00,0 0 16px rgba(255,204,0,.22)}
.mon.cos-fr-perfect{box-shadow:inset 0 1px 0 rgba(0,221,255,.06),0 0 0 2px #00ff88,0 0 18px rgba(0,255,136,.28)}
.meta-panel.cos-fr-silver{border-color:#8a9aaa;box-shadow:0 0 0 1px rgba(170,170,170,.35),0 8px 32px rgba(0,0,0,.45)}
.meta-panel.cos-fr-gold{border-color:#aa8800;box-shadow:0 0 0 1px rgba(255,204,0,.35),0 0 20px rgba(255,204,0,.08),0 8px 32px rgba(0,0,0,.45)}
.meta-panel.cos-fr-perfect{border-color:#00aa66;box-shadow:0 0 0 1px rgba(0,255,136,.35),0 0 20px rgba(0,255,136,.1),0 8px 32px rgba(0,0,0,.45)}
.bv{background:rgba(10,16,25,.92);padding:10px 12px 8px;position:relative;overflow:hidden}
.bv::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--g);opacity:.35;transition:background .4s,opacity .4s}
.bv.w::after{background:var(--y);opacity:.65}.bv.cr::after{background:var(--r);opacity:1}
.bv.hl{background:rgba(13,21,32,.98);border-color:rgba(0,221,255,.25)}
.bv .vl{font-size:7px;letter-spacing:2px;color:var(--td);text-transform:uppercase;margin-bottom:2px}
.bv .vg{font-size:6px;opacity:.65}
.bv .vv{font-family:var(--fd);font-size:36px;font-weight:900;color:var(--cos-ecg,var(--g));line-height:1;transition:color .35s;font-variant-numeric:tabular-nums}
.bv.w .vv{color:var(--y)}.bv.cr .vv{color:var(--r)}
.bv .vu{font-size:8px;color:var(--td);margin-left:2px}

.log{flex:1;min-height:0;height:0;overflow:hidden;padding:4px 8px 6px;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;background:var(--bg);position:relative;border-top:1px solid var(--b)}
.log.exp{max-height:none;overflow-y:auto;justify-content:flex-start}
.lx{position:absolute;top:4px;right:8px;font-size:7px;color:var(--td);cursor:pointer;z-index:2;padding:3px 5px;background:rgba(3,6,8,.8);border-radius:3px;border:1px solid var(--b)}
.lm{font-size:9px;padding:3px 7px;border-left:2px solid var(--td);color:var(--tm);animation:fi .25s ease-out;flex-shrink:0;line-height:1.35}
.lm:nth-last-child(n+4){opacity:0;height:0;padding:0;overflow:hidden;border:none}
.log.exp .lm:nth-last-child(n+4){opacity:1;height:auto;padding:3px 7px;border-left:2px solid var(--td)}
.lm.w{border-color:var(--y);color:var(--y)}.lm.d{border-color:var(--r);color:var(--r)}.lm.i{border-color:var(--cy);color:var(--cy)}.lm.s{border-color:var(--g);color:var(--g)}.lm.e{border-color:var(--o);color:var(--o);font-weight:bold}
@keyframes fi{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.35}}

.at{padding:2px 6px;border-radius:3px;letter-spacing:.5px;font-family:var(--fm);font-size:7px;white-space:nowrap;flex-shrink:0}
.at.on{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);color:var(--g)}
.at.hi{background:rgba(255,204,0,.06);border:1px solid rgba(255,204,0,.15);color:var(--y)}
.at.cr{background:rgba(255,51,68,.06);border:1px solid rgba(255,51,68,.15);color:var(--r)}
.at.dm{opacity:.45}

.ag{padding:5px max(6px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(6px,env(safe-area-inset-left));background:var(--p);border-top:1px solid var(--b);display:grid;grid-template-columns:repeat(3,1fr);gap:3px;flex-shrink:0}
.ab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;border:1px solid var(--b);border-radius:6px;background:var(--c);color:var(--w);font-family:var(--fm);font-size:9px;cursor:pointer;transition:background .12s,border-color .12s;-webkit-user-select:none;user-select:none;min-height:44px;max-height:44px;position:relative;overflow:hidden;text-align:center;line-height:1.15}
.ab:active{transform:scale(.93)}
.ab:focus-visible{outline:1px solid var(--cy);outline-offset:1px}
.ab .bi{font-size:13px;margin-bottom:1px;line-height:1}.ab .bl{font-size:7px;color:var(--tm);margin-top:1px;letter-spacing:.3px}
.ab .bl.val{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--cy)}

/* Visual diagnostics popup */
.dxv{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:60;display:none;align-items:center;justify-content:center;flex-direction:column}
.dxv.v{display:flex}
.dxv-panel{background:#05080c;border:1px solid var(--cy);border-radius:8px;padding:8px;box-shadow:0 8px 30px rgba(0,0,0,.8)}
.dxv-t{font-family:var(--fd);font-size:9px;color:var(--cy);letter-spacing:2px;margin-bottom:6px;text-align:center}
.dxv-c{display:block;border-radius:4px}
.dxv-hint{font-size:8px;color:var(--td);text-align:center;margin-top:6px}
.ab.ah{border-color:#1a3a4a}.ab.ah:active{border-color:var(--cy);background:rgba(0,221,255,.05)}
.ab.av{border-color:#1a2a3a}.ab.av:active{border-color:var(--g);background:rgba(0,255,136,.05)}
.ab.al{border-color:#2a2a1a}.ab.al:active{border-color:var(--o);background:rgba(255,136,51,.05)}
.ab.ad{border-color:#1a2a2a}.ab.ad:active{border-color:var(--cy);background:rgba(0,221,255,.05)}
.ab.to{border-color:var(--g);background:rgba(0,255,136,.08);box-shadow:0 0 8px rgba(0,255,136,.06)}
.ab.cd{opacity:.25;pointer-events:none}
.ab .co{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;color:var(--cy);border-radius:5px}
.ab.cd .co{display:flex}
.ab.hd{display:none}
.ab.gw{animation:bg .5s ease-out}
@keyframes bg{0%{box-shadow:0 0 14px 3px rgba(0,255,136,.25)}100%{box-shadow:none}}
.mt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;font-family:var(--fd);font-weight:700;pointer-events:none;animation:tu 1.1s ease-out forwards;opacity:0;z-index:5;text-shadow:0 0 6px rgba(0,0,0,.9)}
.mt.pos{color:var(--g)}.mt.neg{color:var(--r)}.mt.neu{color:var(--tm)}
@keyframes tu{0%{opacity:1;transform:translate(-50%,-50%)}50%{opacity:1;transform:translate(-50%,calc(-50% - 12px))}100%{opacity:0;transform:translate(-50%,calc(-50% - 18px))}}

/* === OVERLAYS === */
.ov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:40;padding:16px;text-align:center;overflow-y:auto}
.ov.v{display:flex}
.ov-dim{background:rgba(3,6,8,.9)}
.ov-solid{background:var(--bg)}

.pbb{max-width:380px;width:100%;text-align:left;margin-top:44px}
.pbb-back{position:absolute;top:max(10px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));z-index:2}
.pbb-h{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:3px;color:var(--cy);text-transform:uppercase;margin-bottom:8px;text-align:center}
.pbb-s{margin-bottom:6px}.pbb-l{font-size:7px;letter-spacing:2px;color:var(--td);text-transform:uppercase;margin-bottom:2px}
.pbb-t{font-size:10px;color:var(--w);line-height:1.4}
.pbb-t em{color:var(--cy);font-style:normal}
.pbb-v{display:flex;gap:5px;flex-wrap:wrap;margin:4px 0}
.pbb-vi{padding:3px 7px;border:1px solid var(--b);border-radius:3px;font-size:9px;color:var(--tm);background:var(--c)}
.pbb-vi.w{border-color:var(--y);color:var(--y)}.pbb-vi.ok{border-color:var(--gd);color:var(--g)}
.pbb-ex{padding:5px 9px;border-left:2px solid var(--tm);font-size:9px;color:var(--w);line-height:1.5;white-space:pre-line;margin:4px 0}
.pbb-cn{padding:5px 9px;border-left:2px solid var(--o);font-size:9px;color:var(--o);line-height:1.4;margin:4px 0}
.obtn{display:block;width:100%;margin-top:12px;padding:12px;border:1px solid var(--g);border-radius:6px;background:rgba(0,255,136,.06);color:var(--g);font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:4px;cursor:pointer;text-align:center}

.go-t{font-family:var(--fd);font-size:16px;font-weight:900;letter-spacing:4px;margin-bottom:6px}
.go-t.win{color:var(--g)}.go-t.lose{color:var(--r)}
.go-sub{font-size:10px;color:var(--tm);margin-bottom:4px;line-height:1.4;white-space:pre-line}
.go-diag{margin:6px 0;padding:7px 10px;border:1px solid var(--cy);border-radius:4px;font-size:8px;color:var(--cy);line-height:1.5;max-width:360px;text-align:left}
.go-diag strong{color:var(--w);font-weight:normal}
.go-stats{margin:6px 0;font-size:8px;color:var(--td);line-height:1.6;max-width:360px}
.go-stars{font-size:24px;margin:8px 0;letter-spacing:4px}
.go-bars{width:100%;max-width:300px;margin:6px auto;display:flex;flex-direction:column;gap:4px}
.go-bar{display:flex;align-items:center;gap:6px;font-size:8px;color:var(--tm)}
.go-bar span{width:42px;text-align:right;flex-shrink:0}
.go-bar b{width:34px;text-align:left;font-family:var(--fd);font-weight:700}
.go-bar-t{flex:1;height:6px;background:var(--c);border:1px solid var(--b);border-radius:3px;overflow:hidden}
.go-bar-f{height:100%;background:var(--g);width:0;transition:width .8s ease-out}
.go-bar-f.mid{background:var(--y)}.go-bar-f.low{background:var(--r)}
.go-best{font-family:var(--fd);font-size:12px;color:var(--y);letter-spacing:3px;margin:4px 0;animation:bl 1s infinite}
.go-hint{font-size:8px;color:var(--cy);margin:4px 0;max-width:300px;line-height:1.4}
.go-btns{display:flex;gap:8px;margin-top:8px}
.go-btn{flex:1;padding:10px;border:1px solid var(--b);border-radius:6px;background:var(--c);color:var(--tm);font-family:var(--fd);font-size:10px;letter-spacing:2px;cursor:pointer;text-align:center}
.go-btn.pri{border-color:var(--cy);color:var(--cy);background:rgba(0,221,255,.06)}
.go-btn.share{border-color:var(--g);color:var(--g);background:rgba(0,255,136,.05)}
.go-debrief{margin:6px 0;padding:7px 10px;border:1px solid var(--y);border-radius:4px;font-size:8px;color:var(--y);line-height:1.6;max-width:360px;text-align:left}
.go-debrief strong{color:var(--w);font-weight:normal;letter-spacing:1px}

/* Guided tutorial */
.tut-ov{position:absolute;inset:0;background:rgba(0,0,0,.62);z-index:90;display:none}
.tut-ov.v{display:block}
.tut-box{position:absolute;z-index:92;background:var(--p);border:1px solid var(--cy);border-radius:8px;padding:10px 12px;max-width:250px;font-size:10px;line-height:1.55;color:var(--w);box-shadow:0 6px 24px rgba(0,0,0,.7)}
.tut-box .tut-t{font-family:var(--fd);color:var(--cy);font-size:9px;letter-spacing:2px;margin-bottom:5px}
.tut-box .tut-btns{display:flex;gap:8px;margin-top:9px;justify-content:flex-end}
.tut-box button{background:rgba(0,221,255,.1);border:1px solid var(--cy);color:var(--cy);font-family:var(--fd);font-size:9px;padding:6px 12px;border-radius:5px;cursor:pointer;letter-spacing:1px}
.tut-box button.skip{border-color:var(--b);color:var(--tm);background:none}
.tut-hl{position:relative;z-index:91;box-shadow:0 0 0 2px var(--cy),0 0 18px rgba(0,221,255,.55);border-radius:6px}

#ov-pause{background:rgba(3,6,8,.94)}
.pause-menu{display:flex;flex-direction:column;align-items:center}
.pause-card{width:min(280px,88vw);padding:20px 18px 16px;border:1px solid rgba(0,221,255,.22);border-radius:12px;background:linear-gradient(180deg,rgba(10,16,25,.95) 0%,rgba(6,10,16,.98) 100%);box-shadow:0 0 24px rgba(0,221,255,.08),0 12px 40px rgba(0,0,0,.5)}
.pause-title{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:6px;color:var(--cy);margin-bottom:8px;text-shadow:0 0 16px rgba(0,221,255,.2)}
.pause-sub{font-family:var(--fd);font-size:8px;letter-spacing:2px;color:var(--td);margin-bottom:16px;text-transform:uppercase}
.pause-actions{display:flex;flex-direction:column;align-items:center;width:100%}
.pause-btn{padding:12px 32px;margin:6px 0;border:1px solid var(--cy);background:rgba(0,221,255,.06);color:var(--cy);font-family:var(--fd);font-size:12px;letter-spacing:2px;cursor:pointer;border-radius:6px;transition:all .2s;width:100%;max-width:200px;-webkit-user-select:none;user-select:none;min-height:44px}
.pause-btn:hover{border-color:var(--g);color:var(--g);background:rgba(0,255,136,.06)}
.pause-btn:active{transform:scale(.98)}
.pause-btn.primary{border-color:var(--g);color:var(--g);background:rgba(0,255,136,.08);box-shadow:0 0 12px rgba(0,255,136,.1)}
.pause-btn.primary:hover{background:rgba(0,255,136,.12)}
.pause-btn.quit{color:var(--r);border-color:rgba(255,51,68,.55)}
.pause-btn.quit:hover{color:var(--r);background:rgba(255,80,100,.08)}
.modal-backdrop{display:none;position:fixed;left:0;right:0;top:0;z-index:49;background:rgba(3,6,8,.35)}
.modal-backdrop.v{display:block}
.modal{position:fixed;background:var(--c);border:1px solid var(--cy);padding:10px 12px;border-radius:8px;z-index:50;width:152px;box-shadow:0 4px 16px rgba(0,0,0,.55);display:none;gap:2px}
.modal.v{display:flex;flex-direction:column;align-items:stretch}
.modal.diag{width:180px}
.modal button{margin:0;padding:8px 6px;font-size:10px;cursor:pointer;background:var(--b);border:1px solid var(--cy);color:var(--cy);border-radius:5px;font-family:var(--fd);font-weight:700;-webkit-user-select:none;user-select:none;transition:background .12s,border-color .12s}
.modal button:active{background:rgba(0,255,136,.12);border-color:var(--g);color:var(--g)}
.modal-title{font-family:var(--fd);font-size:8px;letter-spacing:2px;color:var(--cy);text-align:center;margin-bottom:2px;text-transform:uppercase}
.modal-val{font-family:var(--fd);font-size:26px;font-weight:900;color:var(--g);text-align:center;line-height:1;margin:2px 0 6px}
.modal-row{display:flex;gap:6px}
.modal-row button{flex:1;min-width:0;padding:10px 4px}
.modal button.wide{width:100%;margin-top:2px;font-family:var(--fm);font-weight:400;font-size:10px;padding:8px 6px;position:relative;overflow:hidden}
.modal button.cd{opacity:.45;pointer-events:none}
.modal button .co{position:absolute;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;color:var(--cy);border-radius:4px}
.modal button.cd .co{display:flex}
.modal button.lk{opacity:.38;pointer-events:none}
.modal button.lk .co{display:flex;color:var(--td);font-size:9px}
.modal .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:2px}

.ab.lk{opacity:.35;pointer-events:none}

.modal button.unlock-pulse{animation:unlockPulse 1.15s ease-in-out 2}

.pbb-unl{margin:8px 0 2px;padding:7px 10px;border:1px solid rgba(0,255,136,.35);border-radius:5px;background:rgba(0,255,136,.05);color:var(--g);font-size:9px;line-height:1.5;letter-spacing:.5px}

class Patient {
  constructor(){this.reset(['edema'],1);}

  reset(pathKeys,mult){
    this.pathKeys=pathKeys;this.mult=mult;this._tutorial=false;
    // Merge init values from all active pathologies
    const merged={edema:0,sec:0,inf:0,vasc:80,perf:78,co2bias:0,rvStrain:0,autoPeep:0,bleed:0};
    const mRates={edema:0,sec:0,inf:0,vasc:0};
    const allClues=[];
    pathKeys.forEach(k=>{
      const p=getPathEntry(k,PATH);if(!p)return;
      Object.keys(p.init).forEach(v=>{
        if(v==='vasc'||v==='perf') merged[v]=Math.min(merged[v],p.init[v]);
        else merged[v]=Math.max(merged[v],p.init[v]);
      });
      Object.keys(p.rates).forEach(v=>{mRates[v]=Math.max(mRates[v],p.rates[v]);});
      allClues.push(...p.clues);
    });
    this.rates=mRates;this.clues=allClues;

    this.oxygenation=85;this.perfusion=merged.perf;this.infection=merged.inf;
    this.vascularTone=merged.vasc;this.lactate=merged.inf>15?2.2:1.0;

    this.co2bias=merged.co2bias;this.rvStrain=merged.rvStrain;
    this.autoPeep=merged.autoPeep;this.bleed=merged.bleed;

    this.compliance=50-merged.edema*.15;this.lungInjury=0;this.hiFio2=0;
    this.norepiOn=false;this.norepiDur=0;this.norepiCum=0;

    this.diureticActive=false;this.diureticTimer=0;this.diureticsGiven=0;

    this.phase=1;this.phaseT=0;
    this.nextSecEvt=30+Math.floor(Math.random()*25);this.secEvtCount=0;
    this._dHR=82;this._dMAP=72;this._dSpO2=96;this._dRR=16;
    this.lowMAPT=0;this.lowSPT=0;this.arrest=false;this.arrestReason='';
    this.badSuctions=0;this.goodSuctions=0;this.peakLI=0;this.peakLac=this.lactate;
    this._hasPneumo=false;this._pneumoT=0;this._evtSec=false;
    this.goalMapF=0;this.goalSpoF=0;this.lacHist=[this.lactate];
    this.correctAct=0;this.wrongAct=0;
    this.stableT=0;this.stabilized=false;this.stabAnnounced=false;
    this._mapB=[];this._perfB=[];this._oxyB=[];
    this._neJust=false;this._mapAtF=0;this._mapAtN=0;
    this.abxGiven=false;this.abxT=0;this.abxApplied=false;this._abxWorks=false;
    this.bronchT=0;this.anticoagOn=false;this._bronchGiven=false;
    this.dobuOn=false;this._dobuFx=0;this.vasoOn=false;this.epiT=0;this._epiGiven=false;
    this.transfusions=0;this.drained=false;this._advLabs=false;
  }

  initLevel1(){
    this._tutorial=true;
    this.pulmonaryEdema=35;this.secretions=15;this.infection=3;
    this.vascularTone=80;this.perfusion=78;this.lactate=1.2;
    this.lacHist=[1.2];this.cardiacOutput=72;
    this.oxygenation=92;this.compliance=50-this.pulmonaryEdema*.15;
    this.rates={edema:.01,sec:0,inf:.01,vasc:0};
    this.phase=1;this.phaseT=0;
    this.nextSecEvt=9999;
    this._dMAP=72;this._dSpO2=89;this._dHR=98;this._dRR=20;
    this.clues=getL1Clues();
  }

  get phaseName(){return getPhaseName(this.phase)}
  get phaseCSS(){return['','s','d','u','x'][this.phase]}

  get rawHR(){let h=55+(100-this.perfusion)*.7+(100-this.oxygenation)*.25+this.infection*.2+(100-this.vascularTone)*.15+this.rvStrain*.1;if(this.norepiOn)h+=5;if(this.dobuOn)h+=8;if(this.epiT>0)h+=12;if(this.bleed>15)h+=this.bleed*.3;return Math.round(Math.min(200,Math.max(30,h)));}
  get rawMAP(){let m=20+this.vascularTone*.35+this.cardiacOutput*.25;if(this.norepiOn)m+=16;if(this.diureticActive)m-=(this._tutorial?1:3);if(this.peep>10)m-=(this.peep-10)*1.5;if(this.rvStrain>30)m-=(this.rvStrain-30)*.15;for(const b of this._mapB)m+=b.a;return Math.round(Math.min(140,Math.max(20,m)));}
  get rawSpO2(){const ce=this.compliance/50,le=Math.max(.3,1-this.lungInjury/120);const eo=this.oxygenation*le*ce;const pb=Math.min(8,(this.peep-5)*.7*(1+this.pulmonaryEdema/100));let s=68+eo*.28+(this.fio2-21)*.07+pb-this.secretions*.22-this.pulmonaryEdema*(this._tutorial&&this.pulmonaryEdema>30?0.22:0.18);if(this._hasPneumo)s-=8;if(this.rvStrain>25)s-=(this.rvStrain-25)*.12;for(const b of this._oxyB)s+=b.a;return Math.round(Math.min(100,Math.max(0,s)));}
  get rawRR(){return Math.round(Math.min(45,Math.max(6,12+(100-this.oxygenation)*.16+this.infection*.07+this.pulmonaryEdema*.06+this.lungInjury*.04+this.co2bias*.15)));}
  get HR(){return Math.round(this._dHR)}
  get MAP(){return Math.round(this._dMAP)}
  get SpO2(){return Math.min(100,Math.max(0,Math.round(this._dSpO2)))}
  get RR(){return Math.round(this._dRR)}
  get Pplat(){return Math.round((this.tidalVolume*100)/Math.max(15,this.compliance)+this.peep+this.autoPeep);}

  get primaryProblem(){const pr=[];if(this.MAP<65)pr.push({id:'hemo',sev:this.MAP<50?3:this.MAP<60?2:1,label:getProblemLabel('hemo')});if(this.SpO2<92)pr.push({id:'oxy',sev:this.SpO2<80?3:this.SpO2<88?2:1,label:getProblemLabel('oxy')});if(this.secretions>35)pr.push({id:'airway',sev:this.secretions>65?3:this.secretions>50?2:1,label:getProblemLabel('airway')});if(!pr.length)return{p:{id:'ok',label:getProblemLabel('ok'),sev:0},s:null};pr.sort((a,b)=>b.sev-a.sev);return{p:pr[0],s:pr[1]||null};}
  get lacTrend(){const h=this.lacHist;if(h.length<3)return'?';const r=h.slice(-3);return r[2]<r[0]-.2?'↓':r[2]>r[0]+.2?'↑':'→';}

  tick(dt,gt){
    const M=this.mult,R=this.rates;
    this.infection=Math.min(100,this.infection+(R.inf+Math.random()*(.08*(this._tutorial?0:1)))*M);
    this.phaseT+=dt;
    if(!this._tutorial){
      if(this.phase===1&&(this.infection>25||gt>60)){this.phase=2;this.phaseT=0;}
      if(this.phase===2&&(this.infection>50||gt>180)){this.phase=3;this.phaseT=0;}
      if(this.phase===3&&(this.infection>75||gt>360)){this.phase=4;this.phaseT=0;}
    }

    // Vascular tone
    this.vascularTone-=this.infection*R.vasc*(this.phase>=3?1.6:1);
    if(this.norepiOn){if(this._neJust){this.vascularTone=Math.min(100,this.vascularTone+5);this._neJust=false;}this.vascularTone=Math.min(100,this.vascularTone+.8);this.norepiDur+=dt;this.norepiCum+=dt;if(this.norepiCum>120)this.perfusion-=((this.norepiCum-120)/400)*.06;}
    this.vascularTone=Math.max(0,Math.min(100,this.vascularTone));

    // Boosts
    const dB=a=>{for(let i=a.length-1;i>=0;i--){a[i].r-=dt;a[i].a-=a[i].d*dt;if(a[i].r<=0||a[i].a<=0)a.splice(i,1);}};
    dB(this._mapB);dB(this._perfB);dB(this._oxyB);
    let perfProt=0;for(const b of this._perfB)perfProt+=b.a;

    // Cardiac output
    const pf=Math.min(1,.5+this.totalFluids/3000);
    const pp=this.peep>10?(this.peep-10)*.04:0;
    this.cardiacOutput=40+this.vascularTone*.3+pf*20-pp*10;
    if(this._hasPneumo)this.cardiacOutput-=10;
    if(this.rvStrain>25)this.cardiacOutput-=(this.rvStrain-25)*.2;
    this.cardiacOutput+=this._dobuFx;
    this.cardiacOutput=Math.max(10,Math.min(100,this.cardiacOutput));

    // Perfusion
    if(this.rawMAP<60)this.perfusion-=(60-this.rawMAP)*.02*(this.phase>=3?1.3:1);
    this.perfusion+=(this.cardiacOutput*.8-this.perfusion)*.015;
    this.perfusion=Math.min(100,this.perfusion+perfProt*.1);
    // Bleeding
    if(this.bleed>10){this.perfusion-=this.bleed*.004*M;this.bleed=Math.max(0,this.bleed-.02);}

    // Lactate
    if(this.perfusion<60)this.lactate+=(60-this.perfusion)*.003*M;
    if(this.perfusion>65&&this.lactate>.8)this.lactate-=.008;
    this.lactate=Math.max(.5,Math.min(20,this.lactate));
    this.peakLac=Math.max(this.peakLac,this.lactate);
    if(gt%5===0)this.lacHist.push(Math.round(this.lactate*10)/10);
    if(this.lacHist.length>13)this.lacHist.shift();

    // Lung injury
    if(this.tidalVolume>8)this.lungInjury+=(this.tidalVolume-8)*.04*M;
    if(this.peep>12)this.lungInjury+=(this.peep-12)*.02*M;
    if(this.fio2>60){this.hiFio2+=dt;if(this.hiFio2>60)this.lungInjury+=((this.fio2-60)/40)*.05*M;}
    if(this.tidalVolume<=7&&this.peep<=12&&this.fio2<=60)this.lungInjury=Math.max(0,this.lungInjury-.005);

    this.peakLI=Math.max(this.peakLI,this.lungInjury);

    this.compliance=55-this.lungInjury*.3-this.pulmonaryEdema*.15;

    if(this.secretions>10&&!this._tutorial)this.secretions+=.04*(this.phase>=3?2:1);
    this.secretions=Math.max(0,Math.min(100,this.secretions));

    if(this.totalFluids>1500)this.pulmonaryEdema=Math.min(80,this.pulmonaryEdema+((this.totalFluids-1500)/1000)*.05);
    this.pulmonaryEdema+=R.edema*(this.phase>=2?1.3:1)*M;

    if(this.diureticActive){this.diureticTimer-=dt;const dr=this._tutorial?0.5:0.35;this.pulmonaryEdema=Math.max(0,this.pulmonaryEdema-dr);this.totalFluids=Math.max(0,this.totalFluids-8);if(this.diureticTimer<=0)this.diureticActive=false;}
    this.pulmonaryEdema=Math.max(0,Math.min(100,this.pulmonaryEdema));

    // Auto-PEEP (COPD)
    if(this.autoPeep>0){this.autoPeep=Math.max(0,this.autoPeep+.01*M);if(this.tidalVolume<=6&&this.peep<=6)this.autoPeep=Math.max(0,this.autoPeep-.03);}

    // RV strain
    if(this.rvStrain>0&&this.peep>10)this.rvStrain+=.02*M;
    if(this.rvStrain>0&&this.totalFluids>2000)this.rvStrain+=.01;

    // Tamponade: PEEP compresses the heart further (until drained)
    if(this.pathKeys.includes('tamponade')&&!this.drained&&this.peep>8)this.cardiacOutput=Math.max(10,this.cardiacOutput-.06*M);

    // Medications
    if(this.abxGiven&&!this.abxApplied){this.abxT-=dt;if(this.abxT<=0&&this._abxWorks){this.abxApplied=true;this.rates.inf*=0.15;}}
    if(this.abxApplied)this.infection=Math.max(0,this.infection-.12);
    if(this.bronchT>0){this.bronchT-=dt;this.autoPeep=Math.max(0,this.autoPeep-.06);this.co2bias=Math.max(0,this.co2bias-.05);}
    if(this.anticoagOn)this.rvStrain=Math.max(0,this.rvStrain-.05);
    if(this.dobuOn){this._dobuFx=Math.min(16,this._dobuFx+.4);this.vascularTone=Math.max(15,this.vascularTone-.03);}
    else this._dobuFx=Math.max(0,this._dobuFx-.6);
    if(this.vasoOn)this.vascularTone=Math.min(96,this.vascularTone+.35);
    if(this.epiT>0){this.epiT-=dt;this.vascularTone=Math.min(100,this.vascularTone+1.2);this.autoPeep=Math.max(0,this.autoPeep-.08);this.co2bias=Math.max(0,this.co2bias-.06);}
    if(this.drained)this.rvStrain=Math.max(0,this.rvStrain-.5);

    // Pneumothorax
    if(this._hasPneumo){this._pneumoT+=dt;if(this._pneumoT>90){this._hasPneumo=false;this.compliance+=10;this.cardiacOutput+=10;}}

    // Oxygenation
    const lE=Math.max(.3,1-this.lungInjury/120);
    this.oxygenation+=(this.fio2-40)*.012*lE*(this.compliance/50);
    this.oxygenation-=.07+this.infection*.004+this.pulmonaryEdema*.003+this.lungInjury*.002;
    if(this._tutorial&&this.pulmonaryEdema<15)this.oxygenation=Math.min(100,this.oxygenation+.25);
    if(this._tutorial&&this.diureticActive)this.oxygenation=Math.min(100,this.oxygenation+.12);
    this.oxygenation=Math.max(0,Math.min(100,this.oxygenation));
    this.perfusion=Math.max(0,Math.min(100,this.perfusion));

    // Display
    const L=.25;

    // Arrest
    if(this.MAP<50)this.lowMAPT+=dt;else this.lowMAPT=Math.max(0,this.lowMAPT-dt*.5);
    if(this.SpO2<75)this.lowSPT+=dt;else this.lowSPT=Math.max(0,this.lowSPT-dt*.5);
    if(this.lowMAPT>=8){this.arrest=true;this.arrestReason=t('arrest.map');}

  }

  giveFluids(){this._mapAtF=this.MAP;this.totalFluids+=500;this.fluidBoluses++;this.perfusion=Math.min(100,this.perfusion+4);this.cardiacOutput=Math.min(100,this.cardiacOutput+3);const resp=this.vascularTone>30;this._mapB.push({a:resp?6:2,r:12,d:(resp?6:2)/12});this._perfB.push({a:8,r:10,d:.8});return resp;}

  giveTransfusion(){this.transfusions++;this.totalFluids+=300;this.bleed=Math.max(0,this.bleed-20);this.perfusion=Math.min(100,this.perfusion+8);this._mapB.push({a:7,r:18,d:7/18});this._perfB.push({a:10,r:20,d:.5});}
  giveEpi(){this.epiT=20;this._epiGiven=true;}
  doPericardio(){if(this.pathKeys.includes('tamponade')){this.drained=true;this.rvStrain=Math.max(0,this.rvStrain-15);this.perfusion=Math.min(100,this.perfusion+8);this._mapB.push({a:10,r:20,d:.5});return true;}this.bleed=Math.min(95,this.bleed+18);this.cardiacOutput=Math.max(10,this.cardiacOutput-8);return false;}
  getABG(){const lE=Math.max(.3,1-this.lungInjury/120),eo=this.oxygenation*lE*(this.compliance/50);const pao2=Math.max(30,Math.min(500,Math.round(35+eo*.55+(this.fio2-21)*.75+(this.peep-5)*1.2-this.secretions*.25-this.pulmonaryEdema*.2)));const ph=Math.max(6.9,Math.min(7.55,Math.round((7.25+this.perfusion*.002-this.infection*.001-this.lactate*.008)*100)/100));const paco2=Math.max(15,Math.min(80,Math.round(45-(this.RR-14)*.8+(this.tidalVolume-6)*1.5+this.co2bias+this.autoPeep*.8)));const pf=Math.round(pao2/(this.fio2/100));
    return{pH:ph,PaO2:pao2,PaCO2:paco2,Lac:Math.round(this.lactate*10)/10,PF:pf,interp:interpretABG(this,ph,paco2,pf)};}
}

// ================================================================
//  SOUND ENGINE  -  Web Audio, no assets
// ================================================================
class Snd {
  constructor(){
    let pref='on';
    try{pref=localStorage.getItem('icuSound')||'on';}catch(e){}
    this.on=pref!=='off';
    this.ctx=null;
  }
  _c(){
    if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
    if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();
    return this.ctx;
  }
  toggle(){
    this.on=!this.on;
    try{localStorage.setItem('icuSound',this.on?'on':'off');}catch(e){}
    return this.on;
  }
  tone(f,dur,vol,type){
    if(!this.on)return;
    const c=this._c();if(!c)return;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(vol||.06,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);
    o.start();o.stop(c.currentTime+dur);
  }
  beep(spo2){const f=520+Math.max(0,Math.min(20,spo2-80))*18;this.tone(f,.06,.035,'square');}
  alarm(){this.tone(880,.12,.05,'square');setTimeout(()=>this.tone(660,.12,.05,'square'),150);}
  good(){this.tone(660,.08,.05);setTimeout(()=>this.tone(880,.1,.05),80);}
  bad(){this.tone(220,.16,.06,'sawtooth');}
  win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone(f,.16,.06),i*120));}
  perfect(){[784,988,1175,1319,1568].forEach((f,i)=>setTimeout(()=>this.tone(f,.13,.05),i*85));}
  lose(){[440,330,220].forEach((f,i)=>setTimeout(()=>this.tone(f,.3,.07,'sawtooth'),i*250));}
  nearStab(){this.tone(784,.06,.04);setTimeout(()=>this.tone(988,.08,.04),90);}
}

class Game {
  constructor(){

  _renderStreakCal(s){

  _dateStrOff(days){
    const d=new Date(Date.now()+days*864e5);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  _dailyWeekStats(s){
    const log={};
    (s.dailyLog||[]).forEach(e=>{log[e.d]=e;});
    const scores=[];let wins=0;
    for(let i=6;i>=0;i--){
      const ds=this._dateStrOff(-i);
      const e=log[ds];
      if(e){scores.push(e.s);if(e.w)wins++;}
    }
    const best=scores.length?Math.max(...scores):0;
    const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
    return {best,avg,wins,played:scores.length};
  }

  _renderDailyLog(s){
    const log={};
    (s.dailyLog||[]).forEach(e=>{log[e.d]=e;});
    const today=this._dailyStr();
    let h='';
    for(let i=6;i>=0;i--){
      const ds=this._dateStrOff(-i);
      const e=log[ds];
      const d=new Date(ds+'T12:00:00');
      const lbl=String(d.getDate());
      let pd;
      if(e)pd='<div class="pd'+(e.w?' win':'')+'">'+e.s+'</div>';
      else pd='<div class="pd miss">—</div>';
      h+='<div class="prof-daily-day'+(ds===today?' today':'')+'">'+pd+'<div class="pdl">'+lbl+'</div></div>';
    }
    return h;
  }

  }

      let cls='prof-lv';

      else if(stars>=3)cls+=' perf';

      const st=stars>=3?'★★★':stars>=2?'★★':stars>=1?'★':'';
      lvGrid+='<div class="'+cls+'"><span>'+(locked?'·':i)+'</span>'+(st?'<span class="ps">'+st+'</span>':'')+'</div>';

      '<div class="meta-row"><span>XP</span><b>'+(s.xp||0)+(nextRk?' / '+nextRk.xp:'')+' ('+xpBar+'%)</b></div>'+
      '<div class="meta-row"><span>'+t('profile.coins')+'</span><b>🪙 '+s.coins+'</b></div>'+
      '<div class="meta-row"><span>'+t('profile.dailyBest')+'</span><b>'+(bests.daily||0)+' pts</b></div>'+
      '<div class="meta-row"><span>'+t('profile.winStreak')+'</span><b>'+(s.winStreak||0)+' · '+t('profile.best')+' '+(s.bestWinStreak||0)+'</b></div>'+
      '<div class="meta-row"><span>'+t('profile.survBest')+'</span><b>'+(bests.survival&&bests.survival.p?bests.survival.p+' '+t('profile.patients')+' ('+bests.survival.score+' pts)':'—')+'</b></div>'+
      '<div class="prof-section"><div class="prof-label">'+t('profile.dailyLog')+'</div><div class="prof-daily-log">'+this._renderDailyLog(s)+'</div>'+this._renderDailyLogSum(s)+'</div>'+
      '<div class="prof-section"><div class="prof-label">'+t('profile.campaign')+' · '+cleared+'/30</div><div class="prof-tier-strip">'+this._renderTierStrip()+'</div><div class="prof-lv-grid">'+lvGrid+'</div></div>'+
      '<div class="prof-section"><div class="prof-label">'+t('profile.achievements')+' · '+achCount+'/'+ACHIEVEMENTS.length+'</div><div class="prof-ach">'+achHtml+'</div></div>'+

  _renderShop(){
    const s=this.ensureMeta();
    const p=this.$('shop-panel');
    const cats=['monitor','frame'];
    let tabs='';
    cats.forEach(c=>{tabs+='<button class="shop-tab'+(this._shopCat===c?' on':'')+'" onclick="G.showShop(\''+c+'\')">'+t('shop.cat.'+c)+'</button>';});
    let items='';
    COSMETICS.filter(c=>c.cat===this._shopCat).forEach(c=>{
      const owned=s.owned.includes(c.id);
      const equipped=(c.cat==='scrubs'?s.avatar.outfit:s.avatar[c.cat])===c.id;
      const rankOk=!c.rankReq||this._rankIdx(c.rankReq)<=this._rankIdx(this._rankId());
      const achOk=!c.achReq||s.achievements.includes(c.achReq);
      const locked=!rankOk||!achOk;
      let price='';
      if(c.achReq&&!achOk)price=t('shop.achNeed',{a:t('ach.'+c.achReq)});
      else if(c.priceCoins===0&&owned)price=t('shop.free');
      else if(owned)price=t('shop.owned');
      else price='🪙 '+c.priceCoins;
      items+='<div class="shop-item'+(owned?' owned':'')+(equipped?' equipped':'')+(locked?' locked':'')+(c.premium?' premium':'')+'" onclick="G._shopClick(\''+c.id+'\')">'+
        '<div class="shop-preview">'+this._shopPreview(c)+'</div>'+
        '<div class="shop-item-name">'+t('cos.'+c.id)+'</div>'+
        '<div class="shop-item-price">'+price+(equipped?' ✓':'')+'</div></div>';
    });
    p.innerHTML='<div class="meta-panel-h">'+t('menu.shop')+' · 🪙 '+s.coins+'</div>'+
      '<div class="shop-tabs">'+tabs+'</div><div class="shop-grid">'+items+'</div>'+

  _rankIdx(id){return RANKS.findIndex(r=>r.id===id);}

  _shopPreview(c){
    if(c.cat==='scrubs')return '<span style="display:inline-block;width:24px;height:32px;background:'+c.color+';border-radius:4px'+(c.id.startsWith('pijama')?';border-bottom:3px solid rgba(0,0,0,.3)':'')+'"></span>';
    if(c.cat==='badge')return c.emoji||'—';
    if(c.cat==='monitor')return '<span style="color:'+c.ecg+';font-family:var(--fd)">∿∿∿</span>';
    if(c.cat==='frame')return c.stroke==='none'?'◻':'⬡';
    return '•';
  }

  _shopClick(id){
    const s=this.ensureMeta();
    const c=this._cosmetic(id);
    if(!c)return;
    const rankOk=!c.rankReq||this._rankIdx(c.rankReq)<=this._rankIdx(this._rankId());
    const achOk=!c.achReq||s.achievements.includes(c.achReq);
    if(!rankOk||!achOk)return;
    if(s.owned.includes(id)){
      if(c.cat==='scrubs')s.avatar.outfit=id;
      else s.avatar[c.cat]=id;
      this.setSave(s);this.applyCosmetics();this._renderShop();return;}
    if(c.priceCoins>s.coins)return;
    if(c.priceCoins>0){s.coins-=c.priceCoins;s.shopPurchases=(s.shopPurchases||0)+1;}
    s.owned.push(id);
    if(c.cat==='scrubs')s.avatar.outfit=id;
    else s.avatar[c.cat]=id;
    this.setSave(s);
    this.applyCosmetics();
    this._checkAchievements(null,{win:false,score:0});
    this._renderShop();
  }

  _normCosmetics(c){
    const a=Object.assign({},DEFAULT_COSMETICS,c||{});
    if(a.scrubs&&!a.outfit)a.outfit=a.scrubs;
    return a;
  }

  applyCosmetics(){
    const s=this.ensureMeta();
    const av=s.avatar||DEFAULT_COSMETICS;
    const monitor=this._cosmetic(av.monitor||'monitor_classic')||{};
    const ecg=monitor.ecg||'#00ff88';
    const mon=this.$('scr-gs')?.querySelector('.mon');
    if(mon){
      mon.classList.remove('theme-cyan','theme-amber','theme-red','cos-fr-silver','cos-fr-gold','cos-fr-perfect');
      if(monitor.theme)mon.classList.add(monitor.theme);
      if(av.frame==='frame_silver')mon.classList.add('cos-fr-silver');
      else if(av.frame==='frame_gold')mon.classList.add('cos-fr-gold');
      else if(av.frame==='frame_perfect')mon.classList.add('cos-fr-perfect');
    }
    this._ecgColor=ecg;
    this._resetWave();
    const deco=this.$('scr-mm')?.querySelector('.mm-ecg-deco path');
    if(deco)deco.setAttribute('stroke',ecg);
    const app=this.$('app');
    if(app)app.style.setProperty('--cos-ecg',ecg);
    document.querySelectorAll('.meta-panel').forEach(p=>{
      p.classList.remove('cos-fr-silver','cos-fr-gold','cos-fr-perfect');
      if(av.frame==='frame_silver')p.classList.add('cos-fr-silver');
      else if(av.frame==='frame_gold')p.classList.add('cos-fr-gold');
      else if(av.frame==='frame_perfect')p.classList.add('cos-fr-perfect');
    });

  _recordDailyLog(s,ds,score,win){
    if(!s.dailyLog)s.dailyLog=[];
    const i=s.dailyLog.findIndex(x=>x.d===ds);
    const entry={d:ds,s:score,w:!!win};
    if(i>=0){if(score>s.dailyLog[i].s||(score===s.dailyLog[i].s&&win&&!s.dailyLog[i].w))s.dailyLog[i]=entry;}
    else s.dailyLog.push(entry);
    if(s.dailyLog.length>21)s.dailyLog=s.dailyLog.slice(-21);
  }

  _awardMeta(win,score,stars,speedPts,improved){
    const s=this.ensureMeta();
    let coins=0,xp=0;
    s.gamesPlayed=(s.gamesPlayed||0)+1;
    if(win){
      if(!this._practice||improved){
        s.winStreak=(s.winStreak||0)+1;
        s.bestWinStreak=Math.max(s.bestWinStreak||0,s.winStreak);
      }
      xp=50;
      if(this.mode==='campaign'){
        coins=10+stars*5+Math.min(10,speedPts);
        if(this._firstClear)coins+=15;
        else if(this._practice&&!improved)coins=Math.max(2,Math.round(coins*0.4));
        if(!s.bests.levels)s.bests.levels={};
        s.bests.levels[this.lvl.id]=Math.max(s.bests.levels[this.lvl.id]||0,score);
      }else if(this.mode==='daily'){
        xp=80;coins=20+Math.floor(score/5);
        const stk=s.dailyStreak?s.dailyStreak.n:1;
        if(stk>=7)coins=Math.round(coins*1.12);
        if(stk>=14)coins=Math.round(coins*1.18);
        if(stk>=30)coins=Math.round(coins*1.25);
        s.dailyWins=(s.dailyWins||0)+1;
        s.bests.daily=Math.max(s.bests.daily||0,score);
        const ds=this._dailyStr();
        if(!s.dailyHistory.includes(ds))s.dailyHistory.push(ds);
      }else if(this.mode==='survival'){
        xp=30+Math.min(20,this.survN*2);
        coins=5*this.survN;
        if(this.survN===5)coins+=15;
        else if(this.survN===8)coins+=25;
        else if(this.survN===10)coins+=40;
      }
    }else{
      if(!this._practice)s.winStreak=0;
      xp=10;
      if(this.mode==='survival'&&this.survN>1){
        const cur={p:this.survN-1,s:this.survTotal};
        if(!s.bests.survival||cur.p>s.bests.survival.p||(cur.p===s.bests.survival.p&&cur.s>s.bests.survival.score))s.bests.survival={p:cur.p,score:cur.s};
      }
    }
    s.xp=(s.xp||0)+xp;
    s.coins=(s.coins||0)+coins;
    s.lifetimeCoins=(s.lifetimeCoins||0)+coins;
    this.setSave(s);
    return {coins,xp};
  }

  _checkMissions(r){
    const s=this.ensureMeta();
    this._ensureMissions(s);
    let bonus=0;
    s.missions.items.forEach(m=>{
      if(m.done)return;
      const def=MISSION_POOL.find(x=>x.id===m.id);
      if(def&&def.check(this,r)){m.done=true;bonus+=m.reward;}
    });
    if(bonus>0){s.coins+=bonus;s.lifetimeCoins+=bonus;this.setSave(s);}
    return bonus;
  }

  _toastCosmetic(id){
    setTimeout(()=>this._toastMsg('🎨 '+t('unlock.new')+': '+t('cos.'+id)),3200);
  }

  _grantAchCosmetics(a,s){
    const map={tier1_clear:'badge_legend',streak_30:'frame_gold',streak_7:'monitor_cyan',surv_5:'monitor_amber',surv_10:'monitor_red',perfect_10:'frame_silver',perfect_30:'frame_perfect'};
    const id=map[a.id];
    if(id&&!s.owned.includes(id)){s.owned.push(id);this._toastCosmetic(id);}
  }

  _checkAchievements(r,result){
    const s=this.ensureMeta();
    let newCoins=0;
    ACHIEVEMENTS.forEach(a=>{
      if(s.achievements.includes(a.id))return;
      try{
        if(a.check(this,s,result||{})){
          s.achievements.push(a.id);
          if(a.coins){s.coins+=a.coins;s.lifetimeCoins+=a.coins;newCoins+=a.coins;}
          this._toastAch(a.id);
          this._grantAchCosmetics(a,s);
        }

  // -- Save/Load --
  getSave(){try{return JSON.parse(localStorage.getItem('icu5'))||{};}catch(e){return{};}}
  setSave(d){try{localStorage.setItem('icu5',JSON.stringify(d));}catch(e){}}
  ensureMeta(){
    const s=this.getSave();
    if(s.coins==null)s.coins=0;
    if(s.xp==null)s.xp=0;
    if(!s.avatar)s.avatar=Object.assign({},DEFAULT_COSMETICS);
    else s.avatar=this._normCosmetics(s.avatar);
    if(!s.owned)s.owned=DEFAULT_OWNED.slice();
    if(!s.achievements)s.achievements=[];
    if(!s.bests)s.bests={daily:0,survival:{p:0,score:0},levels:{}};
    if(s.bests.survival&&s.bests.survival.patients!=null&&!s.bests.survival.p){s.bests.survival.p=s.bests.survival.patients;}
    if(!s.dailyHistory)s.dailyHistory=[];
    if(s.gamesPlayed==null)s.gamesPlayed=0;
    if(s.dailyWins==null)s.dailyWins=0;
    if(s.shareCount==null)s.shareCount=0;
    if(s.lifetimeCoins==null)s.lifetimeCoins=0;
    if(s.shopPurchases==null)s.shopPurchases=0;
    if(s.winStreak==null)s.winStreak=0;
    if(s.bestWinStreak==null)s.bestWinStreak=0;
    if(!s.dailyLog)s.dailyLog=[];
    this._ensureWeekly(s);
    DEFAULT_OWNED.forEach(id=>{if(!s.owned.includes(id))s.owned.push(id);});
    this._ensureMissions(s);

  _rankFromXp(xp){
    let r=RANKS[0];
    for(const rk of RANKS)if(xp>=rk.xp)r=rk;
    return r;
  }
  _rankId(){return this._rankFromXp(this.ensureMeta().xp||0).id;}
  _cosmetic(id){return COSMETICS.find(c=>c.id===id);}
  _ensureMissions(s){
    const ds=this._dailyStr();
    if(!s.missions||s.missions.date!==ds){
      const rng=this._rng(this._dailySeed()+777);
      const pool=MISSION_POOL.slice();
      const picked=[];
      for(let i=0;i<3&&pool.length;i++){const idx=Math.floor(rng()*pool.length);picked.push(Object.assign({done:false},pool.splice(idx,1)[0]));}
      s.missions={date:ds,items:picked};
    }
  }
  getLvlData(id){const s=this.getSave();return s['l'+id]||{stars:0,score:0};}
  setLvlData(id,stars,score){const s=this.ensureMeta();const prev=s['l'+id]||{stars:0,score:0};if(stars>prev.stars||score>prev.score)s['l'+id]={stars:Math.max(stars,prev.stars),score:Math.max(score,prev.score)};s.maxUnlocked=Math.max(s.maxUnlocked||1,id+1);this.setSave(s);}
  getMaxUnlocked(){return this.getSave().maxUnlocked||1;}

  // -- Level Select --
  _lsTotalStars(){let n=0;for(let i=1;i<=30;i++)n+=this.getLvlData(i).stars||0;return n;}
  _lsLevelsCleared(){let n=0;for(let i=1;i<=30;i++)if(this.getLvlData(i).stars>0)n++;return n;}
  _lsNextLevel(){
    const mx=this.getMaxUnlocked();
    for(let i=1;i<=30;i++)if(this.getLvlData(i).stars<1&&i<=mx)return i;
    return null;
  }
  _lsTierIndexForLevel(n){for(let i=0;i<LS_TIERS.length;i++)if(n>=LS_TIERS[i].l&&n<=LS_TIERS[i].r)return i;return 0;}
  _lsTierProgress(tier){let done=0;for(let i=tier.l;i<=tier.r;i++)if(this.getLvlData(i).stars>0)done++;return{done,total:5};}
  _lsIsTierUnlocked(idx){return idx===0||this.getMaxUnlocked()>=LS_TIERS[idx].l;}

  initLS(){
    const next=this._lsNextLevel();

  _renderLSPanel(tierIdx){

    let h='<div class="ls-tier-head"><span class="ls-tier-name">'+t(tier.i18n)+'</span><span class="ls-tier-meta">'+t('ls.tierDone',{done:prog.done})+'</span></div><div class="ls-grid">';
    for(let i=tier.l;i<=tier.r;i++){

  // -- Survival Mode --
  startSurvival(){
    this.mode='survival';this._practice=false;this.survN=1;this.survTotal=0;
    this._survCase();
  }

  nextSurvival(){this.survN++;this._survCase();}

  _pathTag(paths){
    if(paths.includes('mixed'))return t('brief.dailyComplex');
    const n=paths.length;
    return n<=1?t('brief.dailySingle'):n===2?t('brief.dailyDual'):t('brief.dailyComplex');
  }

  _pathNames(paths){
    if(!paths||!paths.length)return '';
    return paths.map(k=>t('path.'+k)).join(' + ');
  }

  _survCase(){
    const n=this.survN;
    const singles=['edema','airway','sepsis','hypovolemic','copd','cardiogenic','pe','rvfail','anaphylaxis','tamponade'];
    const count=n<=2?1:n<=5?2:3;
    const pool=singles.slice();const paths=[];
    for(let i=0;i<count;i++){const idx=Math.floor(Math.random()*pool.length);paths.push(pool.splice(idx,1)[0]);}
    const usesMixed=n>=8&&Math.random()<0.3;
    const mult=Math.min(1.42,0.7+n*0.07);
    const stabReq=Math.min(25,12+Math.floor(n*1.45));
    const events=n>=3?(n>=7?2:1):0;
    this.lvl={id:100+n,paths:usesMixed?['mixed']:paths,mult,stabReq,events,desc:'Survival'};
    this._forcedCaseIdx=null;this._forcedEvts=null;
    this._survGrace=n>=10?90:(n>=8?75:(n>=5?45:0));
    let extra='';
    if(n>1)extra=t('brief.survMeta',{n:n,s:this.survTotal});
    if(n>=8)extra+=(extra?' · ':'')+t('brief.survHard');
    this._brief(t('brief.survTitle',{n:n}),extra);
  }

  // -- Daily Case --
  _dailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
  _dailyStr(){return this._dateStrOff(0);}
  _yesterStr(){return this._dateStrOff(-1);}
  _weekStr(){
    const d=new Date();
    const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dayNum=date.getUTCDay()||7;
    date.setUTCDate(date.getUTCDate()+4-dayNum);
    const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
    const weekNo=Math.ceil((((date-yearStart)/86400000)+1)/7);
    return date.getUTCFullYear()+'-W'+String(weekNo).padStart(2,'0');
  }
  _ensureWeekly(s){
    const wk=this._weekStr();
    if(!s.weekly||s.weekly.week!==wk)s.weekly={week:wk,days:[],wins:0,claimed:false};
    if(!s.weekly.days)s.weekly.days=[];
    s.weekly.wins=s.weekly.days.length;
    return s.weekly;
  }
  _onWeeklyDailyWin(s,ds){
    const w=this._ensureWeekly(s);
    if(w.claimed)return 0;
    if(w.days.includes(ds))return 0;
    w.days.push(ds);
    w.wins=w.days.length;
    if(w.wins>=3){
      w.claimed=true;
      s.coins+=50;
      s.lifetimeCoins+=50;
      return 50;
    }
    return 0;
  }
  _dailyNum(){const d=new Date();const t0=new Date(2026,5,1);return Math.max(1,Math.round((new Date(d.getFullYear(),d.getMonth(),d.getDate())-t0)/864e5)+1);}

  shareResult(){

    else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(done).catch(()=>{});}
  }
  _rng(seed){let a=seed;return function(){a|=0;a=a+0x6D2B79F5|0;let x=Math.imul(a^a>>>15,1|a);x=x+Math.imul(x^x>>>7,61|x)^x;return((x^x>>>14)>>>0)/4294967296;};}

  _rollDaily(rng){
    const dn=this._dailyNum();
    const dow=new Date().getDay();
    const weekend=dow===0||dow===6;
    const tier=dn%7;
    const singles=['edema','airway','sepsis','hypovolemic','copd','cardiogenic','pe','rvfail','anaphylaxis','tamponade'];
    const dual=[['sepsis','edema'],['airway','sepsis'],['pe','rvfail'],['copd','sepsis'],['cardiogenic','edema'],['hypovolemic','sepsis'],['anaphylaxis','edema'],['copd','edema'],['pe','sepsis'],['cardiogenic','rvfail']];
    const triple=[['sepsis','airway','edema'],['cardiogenic','rvfail'],['hypovolemic','sepsis'],['copd','edema'],['pe','sepsis'],['rvfail','sepsis','edema'],['cardiogenic','pe','sepsis'],['copd','airway','edema']];
    let pool;
    if(tier<=1)pool=singles.map(p=>[p]).concat(dual.slice(0,6));
    else if(tier<=3)pool=dual.concat(singles.map(p=>[p]));
    else if(tier<=5)pool=dual.concat(triple).concat([['mixed']]);
    else pool=triple.concat([['mixed']]).concat(dual.slice(0,4));
    const paths=pool[Math.floor(rng()*pool.length)].slice();
    const n=paths.length;
    let mult=1.0+(n-1)*0.11+(weekend?0.07:0)+(tier>=5?0.05:0);
    let stabReq=17+n*3+(weekend?2:0);
    const events=(weekend||n>=3)?2:1;
    mult=Math.min(1.35,mult);
    stabReq=Math.min(26,stabReq);
    const pr=getPathEntry(paths[0],PATH);
    const caseIdx=pr&&pr.cases.length?Math.floor(rng()*pr.cases.length):0;
    const evts=[];
    if(events>=1)evts.push({time:95+Math.floor(rng()*85),evtIdx:Math.floor(rng()*EVENTS.length)});
    if(events>=2){
      let e2=Math.floor(rng()*EVENTS.length);
      if(evts[0]&&evts[0].evtIdx===e2)e2=(e2+3)%EVENTS.length;
      evts.push({time:250+Math.floor(rng()*110),evtIdx:e2});
    }
    const tag=n===1?t('brief.dailySingle'):n===2?t('brief.dailyDual'):t('brief.dailyComplex');
    const intensity=weekend?t('brief.dailyWeekend'):tier>=5?t('brief.dailyHard'):'';
    return {paths,mult,stabReq,events,caseIdx,evts,tag,intensity};
  }

  startDaily(){
    this.mode='daily';this._practice=false;
    const rng=this._rng(this._dailySeed());
    const roll=this._rollDaily(rng);
    this.lvl={id:999,paths:roll.paths,mult:roll.mult,stabReq:roll.stabReq,events:roll.events,desc:'Daily'};
    this._forcedCaseIdx=roll.caseIdx;
    this._forcedEvts=roll.evts;
    this._dailyTag=roll.tag;
    this._dailyIntensity=roll.intensity;
    const s=this.ensureMeta();
    const ds=this._dailyStr();
    const stk=s.dailyStreak;
    const stkN=(stk&&stk.n>0&&(stk.last===ds||stk.last===this._yesterStr()))?stk.n:0;
    const done=s.daily&&s.daily.date===ds;
    let meta=t('brief.dailyNum',{n:this._dailyNum()})+' · '+this._pathNames(roll.paths);
    if(roll.intensity)meta+=' · '+roll.intensity;
    if(stkN>0)meta+=' · '+t('brief.dailyStreak',{n:stkN});
    const allBest=s.bests.daily||0;
    if(allBest>0)meta+=' · '+t('brief.dailyRecord',{n:allBest});
    const wkSt=this._dailyWeekStats(s);
    if(wkSt.best>0)meta+=' · '+t('brief.dailyWeekBest',{n:wkSt.best});
    if(done)meta+=' · '+t('brief.dailyBestToday',{n:s.daily.score});
    this._brief(t('brief.dailyTitle',{d:ds}),meta);
  }

  acceptCase(){
    this.hideOv('ov-brief');
    const lv=this.lvl;
    this.gt=0;this.acc=0;this.lt=performance.now();
    this.running=true;this.paused=false;this.over=false;
    this._cd={};this._cdUntil={};this.at={};this.abgPend=false;this.fEvts=[];
    this._stabM1=false;this._stabM2=false;this._stabNear=false;this._abgUntil=0;this._abgN=0;
    this._sessionDiags={};
    this._beatAcc=0;this._ecgPhase=0;this._lastRBeep=-1;
    this._resetWave();
    this._cacheHud();
    this._astKey='';
    this._alarmOn=false;
    this.applyCosmetics();
    // Clear stale cooldown/lock state on static modal buttons
    document.querySelectorAll('.modal button.cd').forEach(b=>b.classList.remove('cd'));
    document.querySelectorAll('.modal button .co').forEach(c=>c.textContent='');
    this._syncPauseIcon();

    this.p.reset(lv.paths,lv.mult);
    if(lv.id===1)this.p.initLevel1();
    this.p._advLabs=this._unl('advlabs');

    // Schedule events — forced (daily) or random
    this.evts=[];
    if(this._forcedEvts&&lv.events>=1){
      this.evts=this._forcedEvts.map(f=>({time:f.time,evt:EVENTS[f.evtIdx],fired:false}));
    }else{
      if(lv.events>=1){const t1=100+Math.floor(Math.random()*80);const e=EVENTS[Math.floor(Math.random()*EVENTS.length)];this.evts.push({time:t1,evt:e,fired:false});}
      if(lv.events>=2){const t2=280+Math.floor(Math.random()*100);const pool=EVENTS.filter(e=>!this.evts.some(x=>x.evt.id===e.id));const e2=pool[Math.floor(Math.random()*pool.length)]||EVENTS[0];this.evts.push({time:t2,evt:e2,fired:false});}
      if(lv.events<1)this.evts=[];
    }

    // UI
    this._beatAcc=0;
    const hl=this.$('hdr-lvl');
    if(this.mode==='survival')hl.textContent=t('lvl.surv',{n:this.survN});
    else if(this.mode==='daily')hl.textContent=t('lvl.dailyNum',{n:this._dailyNum()});
    else if(this._practice)hl.textContent=t('lvl.practice',{n:lv.id});
    else hl.textContent=t('lvl.header',{n:lv.id});
    this.$('log').innerHTML='<span class="lx" id="lx" onclick="G.toggleLog()">▼</span>';
    this.$('app').classList.remove('alarm');
    this.buildActions();
    this._scheduleLoop();
    this.log(t('game.patientAccepted'),'i');
    if(this.mode==='survival'&&this._survGrace>0)this.log(t('game.survGrace'),'i');
    if(this._practice&&this.mode==='campaign'){
      const d=this.getLvlData(this.lvl.id);
      if((d.score||0)<85)setTimeout(()=>{if(!this.over)this.log(t('game.practiceTarget',{n:85}),'i');},4000);
    }

    // Early clues
    const clues=this.p.clues;
    if(clues[0])setTimeout(()=>{if(!this.over)this.log(clues[0],'');},2000);
    if(clues[1])setTimeout(()=>{if(!this.over)this.log(clues[1],'');},6000);
    if(clues[2])setTimeout(()=>{if(!this.over)this.log(clues[2],'w');},11000);

    this.updateAll();
    this.maybeStartTutorial();
    this.maybeStartCampaignHints();
    this._pulseNewUnlocks();
  }

  _pulseNewUnlocks(){
    if(this.mode!=='campaign'||!this.lvl)return;
    const lv=this.lvl.id;
    if(this.getMaxUnlocked()>lv)return;
    const keys=Object.keys(UNLOCKS).filter(k=>UNLOCKS[k]===lv);
    if(!keys.length)return;
    const ids=new Set();
    keys.forEach(k=>{const id=UNLOCK_BTN[k];if(id)ids.add(id);});
    setTimeout(()=>{
      ids.forEach(id=>{
        const el=this.$(id);
        if(el&&!el.classList.contains('lk')){
          el.classList.add('unlock-pulse');
          setTimeout(()=>el.classList.remove('unlock-pulse'),2600);
        }
      });
      this._toastMsg('🔓 '+t('unlock.new')+': '+keys.map(k=>t('unlock.'+k)).join(' · '));
    },500);
  }

  buildActions(){
    const g=this.$('ag');
    const ab=(cls,icon,label,sub,onclick,id,cdid,subid)=>{
      let h='<button class="ab '+cls+'"'+(id?' id="'+id+'"':'')+' onclick="'+onclick+'">';
      h+='<span class="bi">'+icon+'</span><span>'+label+'</span>';
      if(sub||subid)h+='<span class="bl'+(subid?' val':'')+'"'+(subid?' id="'+subid+'"':'')+'>'+(sub||'')+'</span>';
      if(cdid)h+='<div class="co" id="'+cdid+'"></div>';
      h+='</button>';return h;
    };
    const abL=(key,cls,icon,label,sub,onclick,id,cdid,subid)=>{
      if(this._unl(key))return ab(cls,icon,label,sub,onclick,id,cdid,subid);
      return ab(cls+' lk',icon,label,'🔒 '+t('unlock.lvl',{n:UNLOCKS[key]}),'',id);
    };
    let h='';
    h+=ab('ah','💧',t('action.fluids'),t('action.fluidsSub'),'G.doFluids()','bf','cf');
    h+=abL('norepi','ah','⚡',t('action.norepi'),t('action.norepiSub'),'G.toggleNE()','bn');
    h+=ab('ah','💊',t('action.meds'),t('action.medsSub'),'G.showMedsMenu()','bmeds');
    h+=ab('av','O₂',t('action.fio2'),'40%','G.showFio2Modal()','bfio2',null,'bfio2-sub');
    h+=abL('peep','av','P',t('action.peep'),'8','G.showPeepModal()','bpeep',null,'bpeep-sub');
    h+=abL('vt','av','🫁',t('action.vt'),'6','G.showVtModal()','bvt',null,'bvt-sub');
    h+=ab('av','🫧',t('action.suction'),t('action.suctionSub'),'G.doSuction()','bs','cs');
    h+=abL('abg','al','🩸',t('action.abg'),t('action.abgSub'),'G.orderABG()','ba','ca');
    h+=abL('pocus','ad','🔬',t('action.diagnostics'),null,'G.showDiagMenu()','bdiag');
    g.innerHTML=h;
    this.updateLockUI();
  }

  _unl(key){
    if(!UNLOCKS[key])return true;
    if(this._pathNeedsTool(key))return true;
    if(this.mode!=='campaign')return true;
    const prog=Math.max(this.lvl?this.lvl.id:1,this.getMaxUnlocked());
    return prog>=UNLOCKS[key];
  }

  _pathNeedsTool(key){
    if(!this.lvl||!this.lvl.paths)return false;
    for(const p of this.lvl.paths){
      const needs=PATH_ESSENTIAL[p];
      if(needs&&needs.includes(key))return true;
    }
    return false;
  }

  updateLockUI(){
    const map={'mb-abx':'abx','mb-transfusion':'transfusion','mb-bronch':'bronch','mb-dobu':'dobu','mb-anticoag':'anticoag','mb-vaso':'vaso','mb-epi':'epi','mb-pericardio':'pericardio','db-pocus':'pocus','db-labs':'labs','db-echo':'echo','db-vexus':'vexus'};
    Object.keys(map).forEach(id=>{
      const b=this.$(id);if(!b)return;
      const key=map[id],locked=!this._unl(key);
      b.classList.toggle('lk',locked);
      const co=b.querySelector('.co');
      if(co&&locked)co.textContent='🔒 '+t('unlock.lvl',{n:UNLOCKS[key]});
      else if(co&&co.textContent.startsWith('🔒'))co.textContent='';
    });
  }

    document.querySelectorAll('.modal').forEach(el=>el.classList.remove('v'));

  positionModal(modalId,btnId){
    const modal=this.$(modalId),btn=this.$(btnId),app=this.$('app');
    if(!modal||!btn||!app)return;
    const appR=app.getBoundingClientRect();
    const br=btn.getBoundingClientRect();
    const mw=modal.classList.contains('meds')?252:modal.classList.contains('diag')?180:152;
    modal.style.width=Math.min(mw,appR.width-16)+'px';
    const mW=modal.offsetWidth||mw;
    let left=br.left+br.width/2-mW/2;
    left=Math.max(appR.left+8,Math.min(left,appR.right-mW-8));
    modal.style.left=left+'px';
    modal.style.right='auto';
    modal.style.bottom=(window.innerHeight-br.top+8)+'px';
    modal.style.transform='none';
  }

    const m=this.$(modalId);
    m.classList.add('v');

  _tutShow(){
    const st=this._tutSteps[this._tutI];
    document.querySelectorAll('.tut-hl').forEach(e=>e.classList.remove('tut-hl'));
    const el=this.$(st.el);
